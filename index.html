function rqUpdateParentOpts(){
  var kind=gv('rq_pkind');
  var sel=document.getElementById('rq_parent');var cur=sel?sel.value:'';
  if(kind==='dept'){sel.innerHTML=D.departments.map(function(d){return '<option value="'+d.id+'"'+(cur===d.id?' selected':'')+'>'+esc(d.name)+'</option>';}).join('');}
  else{sel.innerHTML=rqRelatedOpts(kind,cur);}
}
function saveRecruit(id){
  var data={
    status:gv('rq_status')||'open',
    taskId:gv('rq_task')||'',
    jdTitle:gv('rq_jdtitle').trim(),
    jdDescription:rtGet('rq_jddesc'),
    busDevId:gv('rq_busdev')||'',
    pmId:gv('rq_pm')||''
  };
  var kind=gv('rq_pkind'),parent=gv('rq_parent');
  if(kind==='dept'){data.departmentId=parent;data.projectId='';}else{data.projectId=parent;data.departmentId='';}
  if(!data.jdTitle){alert('Job title is required.');return;}
  if(!data.projectId&&!data.departmentId){alert('Select a parent (project, opportunity, or department).');return;}
  data.updatedAt=Date.now();
  if(id){var r=D.recruitings.find(function(x){return x.id===id;});if(r)Object.assign(r,data);}
  else{data.id=uid();data.createdAt=Date.now();data.createdBy=ME?ME.id:'';data.jdAttachments=[];D.recruitings.push(data);}
  save();closeModal('ovRecruit');renderView();
}
function delRecruit(id){
  var cands=(D.candidates||[]).filter(function(c){return c.recruitingId===id;}).length;
  if(!confirm('Delete this requisition?'+(cands?'\n\n'+cands+' candidate(s) on this req will also be removed.':'')))return;
  D.recruitings=D.recruitings.filter(function(r){return r.id!==id;});
  D.candidates=(D.candidates||[]).filter(function(c){return c.recruitingId!==id;});
  save();closeModal('ovRecruit');renderView();
}
function rqUploadAtt(id){
  var r=D.recruitings.find(function(x){return x.id===id;});if(!r)return;
  var inp=document.getElementById('rq_attfile');if(!inp||!inp.files||!inp.files[0])return;
  var fd=new FormData();fd.append('file',inp.files[0]);
  fetch('/api/attachments',{method:'POST',body:fd}).then(function(res){if(!res.ok)throw new Error('upload failed');return res.json();}).then(function(a){
    if(!r.jdAttachments)r.jdAttachments=[];
    r.jdAttachments.push({id:a.id,name:a.name,url:a.url,type:'file',size:a.size});
    if(r.busDevId)pushNotif(r.busDevId,'jd-file','recruiting',r.id,'JD file uploaded: '+(a.name||'file')+' on '+(r.jdTitle||'requisition'));
    save();openRecruitModal(id);
  }).catch(function(e){alert('Upload failed: '+e.message);});
}
function rqDelAtt(id,idx){
  var r=D.recruitings.find(function(x){return x.id===id;});if(!r||!r.jdAttachments)return;
  var a=r.jdAttachments[idx];
  if(a&&a.type==='file'&&a.id){fetch('/api/attachments/'+a.id,{method:'DELETE'}).catch(function(){});}
  r.jdAttachments.splice(idx,1);save();openRecruitModal(id);
}
function openRecruitForTask(taskId){
  rqFilter.taskId=taskId||'';

}

function saveCand(id,reqId){
  var name=gv('cand_name').trim();if(!name){alert('Candidate name is required.');return;}
  var data={
    recruitingId:reqId,
    name:name,
    location:gv('cand_loc').trim(),
    workAuth:gv('cand_wa'),
    salaryK:Number(gv('cand_sal'))||0,
    clearance:gv('cand_clr'),
    availability:gv('cand_avail').trim(),
    source:{kind:gv('cand_src_kind'),agency:gv('cand_src_agency').trim(),referrerId:gv('cand_src_ref')||''},
    status:gv('cand_status')||'new',
    notes:gv('cand_notes').trim()
  };
  if(document.getElementById('cand_off_amt')){
    data.offer={
      amount:Number(gv('cand_off_amt'))||0,
      signingBonus:Number(gv('cand_off_sb'))||0,
      startDate:gv('cand_off_sd')||'',
      state:gv('cand_off_state')||'',
      counterNotes:gv('cand_off_notes').trim()
    };
  }
  if(document.getElementById('cand_rejreason')){
    data.rejectionReason=gv('cand_rejreason');
    data.rejectionNote=gv('cand_rejnote').trim();
  }
  if(id){
    var c=D.candidates.find(function(x){return x.id===id;});if(!c)return;
    var oldSts=c.status;
    Object.assign(c,data);
    if(oldSts!==c.status){
      candLog(id,'status.changed',{from:oldSts,to:c.status});
      var req=(D.recruitings||[]).find(function(r){return r.id===c.recruitingId;});
      if(req&&(c.status==='offer'||c.status==='hired'||c.status==='rejected'))pushNotifMulti([req.busDevId,req.pmId],'status-changed','candidate',c.id,c.name+' moved to '+c.status+' on '+(req.jdTitle||'requisition'));
    }
    if(data.offer&&data.offer.state==='Accepted'&&!(c.events||[]).some(function(e){return e.type==='offer.accepted';}))candLog(id,'offer.accepted',{amount:data.offer.amount});
    save();closeModal('ovCand');renderView();
    // Reopen requisition to refresh the embedded board
    openRecruitModal(reqId);
  } else {
    var dup=candFindDup(name);
    if(dup&&!confirm('A candidate named "'+name+'" already exists in '+(dup.recruitingId===reqId?'this requisition.':'another requisition.')+'\n\nCreate anyway?'))return;
    data.id=uid();data.createdAt=Date.now();data.createdBy=ME?ME.id:'';data.interviews=[];data.events=[];data.resume=null;
    if(!data.offer)data.offer={amount:0,signingBonus:0,startDate:'',state:'',counterNotes:''};
    D.candidates.push(data);
    candLog(data.id,'candidate.created',{name:name,reqId:reqId});
    save();closeModal('ovCand');
    openRecruitModal(reqId);
  }
}
function delCand(id,reqId){
  if(!confirm('Delete this candidate? Resume file (if any) will be removed too.'))return;
  var c=D.candidates.find(function(x){return x.id===id;});
  if(c&&c.resume&&c.resume.id){fetch('/api/attachments/'+c.resume.id,{method:'DELETE'}).catch(function(){});}
  D.candidates=D.candidates.filter(function(x){return x.id!==id;});
  save();closeModal('ovCand');openRecruitModal(reqId);
}
function candReplaceResume(){var inp=document.getElementById('cand_resumefile');if(inp)inp.click();}
function candUploadResume(id){
  var c=D.candidates.find(function(x){return x.id===id;});if(!c)return;
  var inp=document.getElementById('cand_resumefile');if(!inp||!inp.files||!inp.files[0])return;
  var fd=new FormData();fd.append('file',inp.files[0]);
  fetch('/api/attachments',{method:'POST',body:fd}).then(function(r){if(!r.ok)throw new Error('upload failed');return r.json();}).then(function(a){
    if(c.resume&&c.resume.id)fetch('/api/attachments/'+c.resume.id,{method:'DELETE'}).catch(function(){});
    c.resume={id:a.id,name:a.name,url:a.url,mime:a.mime,size:a.size,uploadedAt:Date.now(),uploadedBy:ME?ME.id:''};
    candLog(id,'resume.uploaded',{name:a.name});
    // Notify BusDev + PM on the requisition
    var req=(D.recruitings||[]).find(function(r){return r.id===c.recruitingId;});
    if(req)pushNotifMulti([req.busDevId,req.pmId],'resume-uploaded','candidate',c.id,'Resume uploaded for '+c.name+' on '+(req.jdTitle||'requisition'));
    save();openCandModal(c.recruitingId,id);
  }).catch(function(e){alert('Upload failed: '+e.message);});

function candDelResume(id){

function candAddInterview(id){
  var c=D.candidates.find(function(x){return x.id===id;});if(!c)return;
  var when=gv('cand_iv_when');
  var sel=document.getElementById('cand_iv_who');
  var ids=[];if(sel){for(var i=0;i<sel.options.length;i++){if(sel.options[i].selected)ids.push(sel.options[i].value);}}

  if(!c.interviews)c.interviews=[];

function candUpdInterview(candId,ivId,field,val){
  var c=D.candidates.find(function(x){return x.id===candId;});if(!c)return;
  var iv=(c.interviews||[]).find(function(x){return x.id===ivId;});if(!iv)return;

function candDelInterview(candId,ivId){
  if(!confirm('Delete this interview?'))return;
  var c=D.candidates.find(function(x){return x.id===candId;});if(!c)return;
  c.interviews=(c.interviews||[]).filter(function(x){return x.id!==ivId;});
  candLog(candId,'interview.removed',{ivId:ivId});save();openCandModal(c.recruitingId,candId);

function candHire(id){
  var c=D.candidates.find(function(x){return x.id===id;});if(!c)return;
  if(c.status==='hired'){alert('This candidate is already marked Hired.');return;}
  if(!confirm('Mark '+c.name+' as Hired?\n\nYou\'ll then be prompted to create a Department member entry pre-filled from their candidate data.'))return;
  c.status='hired';
  if(c.offer)c.offer.state=c.offer.state||'Accepted';
  candLog(id,'hired',{});
  // Try to find a sensible department
  var deptOpts=D.departments.map(function(d){return {id:d.id,name:d.name};});
  var pickedDid=prompt('Department to add '+c.name+' to (type the name exactly, or leave blank to skip):\n\nAvailable: '+deptOpts.map(function(d){return d.name;}).join(' · '));
  if(pickedDid){
    var dept=D.departments.find(function(d){return d.name.toLowerCase()===pickedDid.toLowerCase();});
    if(dept){
      var monthlyCost=c.salaryK?Math.round(c.salaryK*1000/12):0;
      var newM={id:uid(),name:c.name,role:'',cost:monthlyCost,badge:'',projects:[],skillsets:[],reportsTo:'',hub:false,sme:false,associate:false,proposal:false,recruiter:false,note:'Hired from candidate '+c.id,reassess:false,location:'',clearance:'',certifications:[],pastProjects:[],pastClients:[],attachments:[],resumeLink:''};
      // Map clearance to existing list if matching
      var clMatch=(D.clearances||[]).find(function(x){return x.name.toLowerCase()===(c.clearance||'').toLowerCase();});
      if(clMatch)newM.clearance=clMatch.id;
      // Move the resume attachment to the member
      if(c.resume){newM.attachments.push({id:c.resume.id,name:c.resume.name,url:c.resume.url,type:'file',size:c.resume.size});}
      dept.members.push(newM);
      candLog(id,'member.created',{memberId:newM.id,deptId:dept.id});
      alert('Created member entry for '+c.name+' in '+dept.name+'.');
    } else {
      alert('Department "'+pickedDid+'" not found. You can create the member manually in Department View.');
    }
  }
  save();openCandModal(c.recruitingId,id);
}

function pushNotif(toMemberId,kind,refType,refId,msg){
  if(!toMemberId)return;
  if(!D.notifications)D.notifications=[];
  D.notifications.push({id:uid(),toMemberId:toMemberId,kind:kind,refType:refType,refId:refId,msg:msg,ts:Date.now(),read:false});
}
function pushNotifMulti(memberIds,kind,refType,refId,msg){
  (memberIds||[]).forEach(function(mid){if(mid)pushNotif(mid,kind,refType,refId,msg);});
}
function myNotifications(){
  if(!ME)return [];
  if(!ME.memberId)return [];
  return (D.notifications||[]).filter(function(n){return n.toMemberId===ME.memberId;});
}
function renderNotifBadge(){
  var bell=document.getElementById('hb_bell');if(!bell)return;
  var badge=document.getElementById('hb_bell_badge');
  var unread=myNotifications().filter(function(n){return !n.read;}).length;
  if(unread>0){badge.style.display='';badge.textContent=unread>99?'99+':String(unread);}else{badge.style.display='none';}
}
function openNotifications(){
  var mine=myNotifications().slice().sort(function(a,b){return b.ts-a.ts;});
  var rows=mine.length?mine.map(function(n){return '<div class="notif-row '+(n.read?'read':'unread')+'" onclick="openNotifTarget(\''+n.id+'\')">'
    +'<div class="notif-msg">'+esc(n.msg)+'<div class="notif-ts">'+new Date(n.ts).toLocaleString()+'</div></div>'
    +'</div>';}).join(''):'<div class="notif-empty">No notifications yet.</div>';
  document.getElementById('mdlNotif').innerHTML=
    '<div style="padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">'
    +'<div><div style="font-size:14px;font-weight:800">Notifications</div>'
    +'<div style="font-size:11px;color:var(--text-muted);margin-top:2px">'+mine.length+' total · '+mine.filter(function(n){return !n.read;}).length+' unread</div></div>'
    +(mine.some(function(n){return !n.read;})?'<button class="btn btn-sec btn-sm" onclick="markAllNotifRead()">Mark all read</button>':'')
    +'</div>'
    +'<div style="max-height:60vh;overflow-y:auto">'+rows+'</div>'
    +'<div style="padding:10px 18px;border-top:1px solid var(--border);text-align:right"><button class="btn btn-sec btn-sm" onclick="closeModal(\'ovNotif\')">Close</button></div>';
  openModal('ovNotif');
}
function openNotifTarget(notifId){
  var n=(D.notifications||[]).find(function(x){return x.id===notifId;});if(!n)return;
  if(!n.read){n.read=true;save();}
  closeModal('ovNotif');
  if(n.refType==='candidate'){
    var c=(D.candidates||[]).find(function(x){return x.id===n.refId;});
    if(c)openCandModal(c.recruitingId,c.id);
  } else if(n.refType==='recruiting'){
    openRecruitModal(n.refId);
  }
  renderNotifBadge();
}
function markAllNotifRead(){
  if(!ME||!ME.memberId)return;
  (D.notifications||[]).forEach(function(n){if(n.toMemberId===ME.memberId)n.read=true;});
  save();openNotifications();renderNotifBadge();
}

function llmDocComplete(opts){
  var body=Object.assign({accountId:ME?ME.id:''},opts||{});
  return fetch('/api/llm/with-attachment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json().then(function(j){if(!r.ok)throw new Error(j&&j.error||('HTTP '+r.status));return j;});});
}
function llmExtractText(resp){
  if(!resp||!Array.isArray(resp.content))return '';
  return resp.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n');
}
function llmExtractJSON(resp){
  var txt=llmExtractText(resp);
  var m=txt.match(/```json\s*([\s\S]*?)```/i);if(m)txt=m[1];
  else{var i=txt.indexOf('{'),j=txt.lastIndexOf('}');if(i>-1&&j>i)txt=txt.slice(i,j+1);}
  try{return JSON.parse(txt);}catch(e){return null;}
}

/* ── JD AI ASSIST ── */
function jdAIToggleMenu(){
  var p=document.getElementById('jdai_pop');if(!p)return;
  p.classList.toggle('show');
}
function jdAIClose(){var p=document.getElementById('jdai_pop');if(p)p.classList.remove('show');}
function jdAIRun(mode){
  jdAIClose();
  var title=gv('rq_jdtitle').trim();
  var current=rtGet('rq_jddesc').trim();
  var stripped=current.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();
  if(mode==='generate'&&!title){alert('Add a JD title first — Claude needs something to start from.');return;}
  if((mode==='rewrite'||mode==='expand')&&!stripped){alert('Type some description text first, then use Rewrite/Expand.');return;}
  var btn=document.getElementById('jdai_btn');if(btn){btn.disabled=true;btn.textContent='✨ Thinking…';}
  var sys='You are an expert technical recruiter writing job descriptions for a US federal/commercial consulting firm. Output ONLY clean HTML (use <p>, <ul>/<li>, <strong>, <em>, no markdown, no code fences, no commentary before or after).';
  var instruction;
  if(mode==='generate')instruction='Write a complete, professional job description for the role: "'+title+'". Include sections: Role Overview, Key Responsibilities (bulleted), Required Qualifications (bulleted), Nice-to-Haves (bulleted). Keep it concise and skimmable. Output HTML only.';
  else if(mode==='rewrite')instruction='Rewrite the following job description text to be cleaner, more professional, and better structured. Keep all the substantive content; improve wording, fix awkward phrasing, organize with sections + bullets where helpful. Title: "'+title+'".\n\nCurrent text:\n'+stripped;
  else if(mode==='expand')instruction='Expand and enrich the following job description text. Flesh out vague bullets, add missing standard sections (overview, responsibilities, qualifications, nice-to-haves) where they\'re missing, but keep the original intent and any specific details. Title: "'+title+'".\n\nCurrent text:\n'+stripped;
  fetch('/api/llm/complete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    accountId:ME?ME.id:'',
    system:sys,
    messages:[{role:'user',content:instruction}],
    max_tokens:2048
  })}).then(function(r){return r.json().then(function(j){if(!r.ok)throw new Error(j&&j.error||('HTTP '+r.status));return j;});}).then(function(j){
    var html=llmExtractText(j).trim();
    // Strip code fences if Claude wrapped output
    html=html.replace(/^```html\s*/i,'').replace(/```$/,'').trim();
    openAIPreview({
      title:'AI '+(mode==='generate'?'Generated':(mode==='rewrite'?'Rewritten':'Expanded'))+' JD',
      html:html,
      onApply:function(finalHtml){var el=document.getElementById('rq_jddesc');if(el)el.innerHTML=finalHtml;},
      onAppend:current?function(finalHtml){var el=document.getElementById('rq_jddesc');if(el)el.innerHTML=(el.innerHTML||'')+'<p>'+finalHtml+'</p>';}:null
    });
  }).catch(function(e){alert('AI assist failed: '+e.message+'\n\nMake sure an Anthropic API key is configured in Admin → Integrations.');})
  .then(function(){if(btn){btn.disabled=false;btn.innerHTML='&#10024; AI';}});
}

function pChip(fid,id,pct,name){
return '<span class="ms-chip proj-chip">'+esc(name)
+' <input type="number" class="pct-input" value="'+pct+'" min="1" max="100" title="% allocation" '
+'oninput="event.stopPropagation();msPctChange(\''+fid+'\',\''+id+'\',this.value)" '
+'onclick="event.stopPropagation()">'
+'%<span class="ms-x" onclick="event.stopPropagation();msRem(\''+fid+'\',\''+id+'\')">&times;</span></span>';}

function msHTML(fid,selIds,items,chipCls,ph){
var isP=chipCls==='proj-chip';
MS_REG[fid]={items:items,chipCls:chipCls,isP:isP};
var chips=selIds.map(function(entry){
  var id=isP?(typeof entry==='string'?entry:entry.id):entry;
  var pct=isP?(typeof entry==='string'?100:(entry.pct||100)):100;
  var it=items.find(function(x){return x.id===id;});if(!it)return '';
  return isP?pChip(fid,id,pct,it.name)
    :'<span class="ms-chip '+chipCls+'">'+esc(it.name)+'<span class="ms-x" onclick="event.stopPropagation();msRem(\''+fid+'\',\''+id+'\')">&times;</span></span>';
}).join('');
return '<div style="position:relative"><div class="ms-wrap" id="'+fid+'_w" onclick="document.getElementById(\''+fid+'_i\').focus()">'
+chips+'<input class="ms-input" id="'+fid+'_i" placeholder="'+(selIds.length?'':ph)+'" onfocus="msShow(\''+fid+'\')" oninput="msFilt(\''+fid+'\')" autocomplete="off">'
+'</div><div class="ms-dd" id="'+fid+'_d" style="display:none"></div>'
+'<input type="hidden" id="'+fid+'_v" value=\''+JSON.stringify(selIds)+'\'></div>';}

function msShow(fid){var dd=document.getElementById(fid+'_d');dd.style.display='block';msFilt(fid);
setTimeout(function(){document.addEventListener('click',function handler(e){if(!e.target.closest('#'+fid+'_w')&&!e.target.closest('#'+fid+'_d')){dd.style.display='none';document.removeEventListener('click',handler);}});},10);}

function msFilt(fid){
var input=document.getElementById(fid+'_i'),q=(input.value||'').toLowerCase();
var sel=JSON.parse(document.getElementById(fid+'_v').value);
var reg=MS_REG[fid]||{},isP=reg.isP||false,items=reg.items||D.skillsets;
var selIds=isP?sel.map(function(e){return typeof e==='string'?e:e.id;}):sel;
var avail=items.filter(function(x){return selIds.indexOf(x.id)===-1&&x.name.toLowerCase().indexOf(q)>-1;});
var dd=document.getElementById(fid+'_d');
var html=avail.map(function(x){return '<div class="ms-opt" onmousedown="event.preventDefault();msAdd(\''+fid+'\',\''+x.id+'\')">'+esc(x.name)+'</div>';}).join('');
if(q&&!items.some(function(x){return x.name.toLowerCase()===q;}))
html+='<div class="ms-opt add-new" onmousedown="event.preventDefault();msNew(\''+fid+'\')">+ Add "'+esc(input.value)+'"</div>';
if(!html)html='<div class="ms-opt" style="color:var(--text-muted);pointer-events:none">No options</div>';
dd.innerHTML=html;}

function msAdd(fid,itemId){
var sel=JSON.parse(document.getElementById(fid+'_v').value);
var isP=(MS_REG[fid]||{}).isP||false;
if(isP){if(!sel.some(function(e){return(typeof e==='string'?e:e.id)===itemId;}))sel.push({id:itemId,pct:100});}
else{if(sel.indexOf(itemId)===-1)sel.push(itemId);}
document.getElementById(fid+'_v').value=JSON.stringify(sel);document.getElementById(fid+'_i').value='';rebuildChips(fid);}

function msRem(fid,itemId){
var sel=JSON.parse(document.getElementById(fid+'_v').value);
var isP=(MS_REG[fid]||{}).isP||false;
sel=sel.filter(function(x){return isP?((typeof x==='string'?x:x.id)!==itemId):(x!==itemId);});
document.getElementById(fid+'_v').value=JSON.stringify(sel);rebuildChips(fid);}

function msPctChange(fid,itemId,val){
var sel=JSON.parse(document.getElementById(fid+'_v').value);
var pct=Math.max(1,Math.min(100,parseInt(val)||100));
sel.forEach(function(e){if((typeof e==='string'?e:e.id)===itemId){if(typeof e!=='string')e.pct=pct;}});
document.getElementById(fid+'_v').value=JSON.stringify(sel);
updateAllocMeter(fid);}

function msNew(fid){var input=document.getElementById(fid+'_i'),name=input.value.trim();if(!name)return;
var reg=MS_REG[fid]||{},nid=uid(),list=reg.items||D.skillsets;list.push({id:nid,name:name});save();msAdd(fid,nid);}

function rebuildChips(fid){
var sel=JSON.parse(document.getElementById(fid+'_v').value);
var reg=MS_REG[fid]||{},isP=reg.isP||false,items=reg.items||D.skillsets,cc=reg.chipCls||'skill-chip';
var wrap=document.getElementById(fid+'_w'),input=document.getElementById(fid+'_i');
wrap.querySelectorAll('.ms-chip').forEach(function(el){el.remove();});
sel.forEach(function(entry){
  var id=isP?(typeof entry==='string'?entry:entry.id):entry;
  var pct=isP?(typeof entry==='string'?100:(entry.pct||100)):100;
  var it=items.find(function(x){return x.id===id;});if(!it)return;
  var chip=document.createElement('span');chip.className='ms-chip '+cc;
  if(isP){chip.innerHTML=pChip(fid,id,pct,it.name);}
  else{chip.innerHTML=esc(it.name)+'<span class="ms-x" onclick="event.stopPropagation();msRem(\''+fid+'\',\''+id+'\')">&times;</span>';}
  wrap.insertBefore(chip,input);});
input.placeholder=sel.length?'':'Type to search...';msFilt(fid);updateAllocMeter(fid);}

function msVal(fid){return JSON.parse(document.getElementById(fid+'_v').value);}

function totalAlloc(m){return(m.projects||[]).reduce(function(s,e){return s+(typeof e==='string'?100:(e.pct||100));},0);}

function updateAllocMeter(fid){
var el=document.getElementById(fid+'_alloc');if(!el)return;
var hidEl=document.getElementById(fid+'_v');if(!hidEl)return;
var sel=JSON.parse(hidEl.value||'[]');
var total=sel.reduce(function(s,e){return s+(typeof e==='string'?100:(e.pct||100));},0);
var isOver=total>100,isFull=total===100;
var cls=isOver?'am-over':isFull?'am-full':'am-under';
var barColor=isOver?'var(--red)':isFull?'var(--green)':'var(--text-muted)';
var barW=Math.min(100,total);
var overW=isOver?Math.min(40,(total-100)/2)+'%':'0';
el.innerHTML='<div class="alloc-meter '+cls+'">'
+'<div class="alloc-bar"><div class="alloc-bar-fill" style="width:'+barW+'%;background:'+barColor+'"></div>'
+(isOver?'<div class="alloc-bar-over" style="width:'+overW+'"></div>':'')
+'</div>'
+'<span>'+(isOver?'⚠ ':isFull?'✓ ':'')+total+'%'+(isOver?' — over-allocated':isFull?' — fully allocated':' allocated')+'</span>'
+'</div>';}

/* ── CLINs (Contract Line Items) ── */
function projAssignedMembers(pid){return allM().filter(function(m){return projIds(m).indexOf(pid)>-1;});}
function memberProjEntry(m,pid){var e=(m.projects||[]).find(function(x){return (typeof x==='object'?x.id:x)===pid;});return e?(typeof e==='object'?e:{id:e,pct:100}):null;}
function clinAssignedMembers(pid,clinId){return projAssignedMembers(pid).filter(function(m){var e=memberProjEntry(m,pid);return e&&e.clinId===clinId;});}
function clinAssignedCost(pid,clinId){return clinAssignedMembers(pid,clinId).reduce(function(s,m){var e=memberProjEntry(m,pid);var pct=e?(e.pct||100):100;return s+Math.round(m.cost*(pct/100));},0);}
function projClinRevenue(p){return (p.clins||[]).reduce(function(s,c){return s+(Number(c.revenue)||0);},0);}
function clinAdd(pid){var p=D.projects.find(function(x){return x.id===pid;});if(!p)return;if(!p.clins)p.clins=[];p.clins.push({id:uid(),number:'',title:'',revenue:0,notes:''});save();openEditProject(pid);}
function clinUpdate(pid,clinId,field,val){var p=D.projects.find(function(x){return x.id===pid;});if(!p||!p.clins)return;var c=p.clins.find(function(x){return x.id===clinId;});if(!c)return;c[field]=(field==='revenue')?(Number(val)||0):val;save();if(field==='revenue'||field==='number'||field==='title')openEditProject(pid);else renderView();}
function clinDel(pid,clinId){if(!confirm('Delete this CLIN? Resource assignments to it will revert to General.'))return;var p=D.projects.find(function(x){return x.id===pid;});if(!p||!p.clins)return;p.clins=p.clins.filter(function(x){return x.id!==clinId;});D.departments.forEach(function(d){d.members.forEach(function(m){(m.projects||[]).forEach(function(e){if(typeof e==='object'&&e.id===pid&&e.clinId===clinId)e.clinId='';});});});save();openEditProject(pid);}
function setAssignmentClin(memberId,pid,clinId){var hit=null;D.departments.forEach(function(d){d.members.forEach(function(m){if(m.id===memberId)hit=m;});});if(!hit)return;hit.projects=(hit.projects||[]).map(function(e){var eid=typeof e==='object'?e.id:e;if(eid!==pid)return e;var pct=typeof e==='object'?(e.pct||100):100;return {id:pid,pct:pct,clinId:clinId||''};});save();openEditProject(pid);}
function renderClinsSection(pid){
  var p=D.projects.find(function(x){return x.id===pid;});if(!p)return '';if(!p.clins)p.clins=[];
  var assignees=projAssignedMembers(pid);
  var totClinRev=projClinRevenue(p);
  var rows=p.clins.map(function(c){
    var rev=Number(c.revenue)||0,cost=clinAssignedCost(pid,c.id),profit=rev-cost;
    var assigned=clinAssignedMembers(pid,c.id);
    var pCol=(profit>=0?'var(--green)':'var(--red)');
    var assignedHTML=assigned.length?assigned.map(function(m){return '<span class="plan-own" onclick="event.stopPropagation();openPersonProfile(\''+m.id+'\')" title="'+esc(m.role||'')+'">'+esc(m.name)+'</span>';}).join(' '):'<span class="plan-own txt">none</span>';
    return '<tr>'
      +'<td><input class="fld-i clin-num" value="'+esc(c.number||'')+'" placeholder="0001" onchange="clinUpdate(\''+pid+'\',\''+c.id+'\',\'number\',this.value)"></td>'
      +'<td><input class="fld-i" value="'+esc(c.title||'')+'" placeholder="Description" onchange="clinUpdate(\''+pid+'\',\''+c.id+'\',\'title\',this.value)"></td>'
      +'<td><input class="fld-i clin-rev" type="number" min="0" value="'+rev+'" onchange="clinUpdate(\''+pid+'\',\''+c.id+'\',\'revenue\',this.value)"></td>'
      +'<td style="text-align:right;color:var(--red);white-space:nowrap">'+fmt(cost)+'</td>'
      +'<td style="text-align:right;font-weight:700;white-space:nowrap;color:'+pCol+'">'+(profit<0?'−':'')+fmt(Math.abs(profit))+'</td>'
      +'<td>'+assignedHTML+'</td>'
      +'<td><button class="btn btn-danger-sm btn-sm" onclick="clinDel(\''+pid+'\',\''+c.id+'\')" title="Delete CLIN">&#10005;</button></td>'
      +'</tr>';
  }).join('');
  // Unassigned cost (people on the project with no CLIN)
  var unCost=assignees.filter(function(m){var e=memberProjEntry(m,pid);return !e||!e.clinId;}).reduce(function(s,m){var e=memberProjEntry(m,pid);var pct=e?(e.pct||100):100;return s+Math.round(m.cost*(pct/100));},0);
  var clinCostTotal=p.clins.reduce(function(s,c){return s+clinAssignedCost(pid,c.id);},0);
  var totalCost=clinCostTotal+unCost;
  var totalProfit=totClinRev-totalCost;
  var pCol=(totalProfit>=0?'var(--green)':'var(--red)');
  var totals='<tr style="background:var(--page-bg);font-weight:800"><td colspan="2">Totals</td><td style="text-align:right">'+fmt(totClinRev)+'</td><td style="text-align:right;color:var(--red);white-space:nowrap">'+fmt(totalCost)+(unCost?' <span style="font-size:9px;color:var(--text-muted);font-weight:400">incl. '+fmt(unCost)+' unassigned</span>':'')+'</td><td style="text-align:right;color:'+pCol+';white-space:nowrap">'+(totalProfit<0?'−':'')+fmt(Math.abs(totalProfit))+'</td><td colspan="2"></td></tr>';
  var clinTable=p.clins.length?'<table class="clin-tbl"><thead><tr><th style="width:80px">CLIN #</th><th>Title</th><th style="width:110px;text-align:right">Revenue/mo</th><th style="width:110px;text-align:right">Cost</th><th style="width:120px;text-align:right">Profit / Loss</th><th>Assigned</th><th style="width:34px"></th></tr></thead><tbody>'+rows+totals+'</tbody></table>':'<div style="font-size:11px;color:var(--text-muted);padding:8px 0">No CLINs yet. Add CLINs to break down this project’s revenue.</div>';
  // Assignment chooser
  var asnTable='';
  if(assignees.length){
    asnTable='<div style="margin-top:14px"><div class="fld-l">Resource &rarr; CLIN assignments</div>'
      +'<table class="clin-asn"><thead><tr><th>Person</th><th style="width:60px">%</th><th style="width:90px;text-align:right">Cost</th><th>Assign to CLIN</th></tr></thead><tbody>'
      +assignees.map(function(m){
        var e=memberProjEntry(m,pid);var pct=e?(e.pct||100):100;var cost=Math.round(m.cost*(pct/100));var cur=e&&e.clinId?e.clinId:'';
        var opts='<option value="">— General (no CLIN) —</option>'+p.clins.map(function(c){return '<option value="'+c.id+'"'+(cur===c.id?' selected':'')+'>'+(c.number?esc(c.number)+': ':'')+esc(c.title||'(untitled CLIN)')+'</option>';}).join('');
        return '<tr><td>'+esc(m.name)+'</td><td>'+pct+'%</td><td style="text-align:right;white-space:nowrap">'+fmt(cost)+'</td><td><select class="fld-sel" onchange="setAssignmentClin(\''+m.id+'\',\''+pid+'\',this.value)">'+opts+'</select></td></tr>';
      }).join('')
      +'</tbody></table></div>';
  }else{
    asnTable='<div style="font-size:11px;color:var(--text-muted);margin-top:8px">No one is assigned to this project yet. Assign people via the Person edit modal, then pin them to a CLIN here.</div>';
  }
  return '<div class="fld"><div class="fld-l" style="display:flex;justify-content:space-between;align-items:center"><span>CLIN Revenue Breakdown</span><button class="btn btn-navy btn-sm" onclick="clinAdd(\''+pid+'\')">+ Add CLIN</button></div>'
    +'<div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">Break down this contract’s revenue into CLINs and pin resources to each line for profit/loss visibility.</div>'
    +clinTable+asnTable+'</div>';
}
function openEditProject(pid){
var p=D.projects.find(function(x){return x.id===pid;});if(!p)return;
var cat=projCat(p);

function fmtSize(b){if(!b)return '';var u=['B','KB','MB'],i=0;while(b>=1024&&i<2){b/=1024;i++;}return (b<10&&i>0?b.toFixed(1):Math.round(b))+u[i];}
function renderAttList(pid){
var p=D.projects.find(function(x){return x.id===pid;});if(!p)return '';
var atts=p.attachments||[];
if(!atts.length)return '<div style="font-size:11px;color:var(--text-muted)">No attachments yet</div>';
return atts.map(function(a,i){var isFile=a.type==='file';var icon=isFile?'&#128196;':'&#128279;';var sz=isFile&&a.size?' <span style="font-size:10px;color:var(--text-muted);font-weight:400">'+fmtSize(a.size)+'</span>':'';
  return '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px solid #F1F5F9">'
  +'<a href="'+esc(a.url)+'" target="_blank" rel="noopener"'+(isFile?' download="'+esc(a.name||'file')+'"':'')+' style="font-size:12px;color:var(--navy);font-weight:600;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+icon+' '+esc(a.name||a.url)+sz+'</a>'
  +'<button class="btn btn-danger-sm btn-sm" onclick="delItemAttachment(\''+pid+'\','+i+')">&#10005;</button></div>';}).join('');}
function uploadItemAttachment(pid){
var p=D.projects.find(function(x){return x.id===pid;});if(!p)return;
var inp=document.getElementById('ep_att_file');var f=inp&&inp.files&&inp.files[0];
if(!f){alert('Choose a file first.');return;}
var btn=document.getElementById('ep_att_upbtn');if(btn){btn.disabled=true;btn.textContent='Uploading…';}
var fd=new FormData();fd.append('file',f);fd.append('projectId',pid);
fetch('/api/attachments',{method:'POST',body:fd}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(a){
  if(!p.attachments)p.attachments=[];p.attachments.push({id:a.id,name:a.name,url:a.url,type:'file',size:a.size});
  save();document.getElementById('ep_att_list').innerHTML=renderAttList(pid);renderView();if(inp)inp.value='';
}).catch(function(e){alert('Upload failed: '+e.message);}).then(function(){if(btn){btn.disabled=false;btn.innerHTML='&#8593; Upload file';}});}
function addItemAttachment(pid){
var p=D.projects.find(function(x){return x.id===pid;});if(!p)return;
var url=gv('ep_att_url').trim();if(!url)return;if(!/^https?:\/\//i.test(url))url='https://'+url;
var name=gv('ep_att_name').trim()||url;
if(!p.attachments)p.attachments=[];p.attachments.push({name:name,url:url,type:'link'});
save();document.getElementById('ep_att_list').innerHTML=renderAttList(pid);
document.getElementById('ep_att_name').value='';document.getElementById('ep_att_url').value='';renderView();}
function delItemAttachment(pid,idx){
var p=D.projects.find(function(x){return x.id===pid;});if(!p)return;
var a=(p.attachments||[])[idx];
if(a&&a.type==='file'&&a.id){fetch('/api/attachments/'+a.id,{method:'DELETE'}).catch(function(){});}
(p.attachments||[]).splice(idx,1);save();
document.getElementById('ep_att_list').innerHTML=renderAttList(pid);renderView();}

function saveEditProject(pid){
var p=D.projects.find(function(x){return x.id===pid;});if(!p)return;
var name=gv('ep_name').trim();if(name)p.name=name;
var newCat=gv('ep_cat')||'project';var catChanged=newCat!==projCat(p);p.category=newCat;
var rv=document.getElementById('ep_rev');
if(newCat==='project'){p.revenue=rv?(Number(rv.value)||0):(p.revenue||0);p.targetRevenue=0;}
else if(isPipelineCat(newCat)){p.targetRevenue=rv?(Number(rv.value)||0):(p.targetRevenue||0);p.revenue=0;}
else{p.revenue=0;p.targetRevenue=0;}
if(newCat==='opportunity'){var sEl=document.getElementById('ep_stage');if(sEl)p.stage=sEl.value;p.customer=gv('ep_customer');p.leadGen=gv('ep_lg');p.presales=gv('ep_ps');p.sales=gv('ep_sales');p.delivery=gv('ep_deliv');p.opr=gv('ep_opr');p.pm=gv('ep_pm');p.team=gv('ep_team');p.closeDate=gv('ep_close');p.changeRequested=gv('ep_change');var potEl=document.getElementById('ep_potential');p.potential=potEl?(Number(potEl.value)||0):(p.potential||0);p.status=gv('ep_status');}
p.revenueNote=gv('ep_note');p.description=rtGet('ep_desc');p.parentId=catChanged?null:(gv('ep_parent')||null);
closeModal('ovDeptEdit');save();
var el=document.getElementById('projList');if(el)el.innerHTML=renderProjList(p.category);
renderView();}

function deleteProject(pid){

save();renderView();}

    +'<div class="fld"><label class="fld-l">Linked person</label><select class="fld-sel" id="ac_member">'+memOpts+'</select></div>'
    +'<div class="fld"><label class="chk-row" style="cursor:pointer"><input type="checkbox" id="ac_active"'+(v.active!==false?' checked':'')+'> <span style="font-size:12px">Active (can log in)</span></label></div>'
    +'<div class="btn-row"><button class="btn btn-navy" style="flex:1" onclick="saveAccount(\''+(ac?ac.id:'')+'\')">Save</button><button class="btn btn-sec" style="flex:1" onclick="openAccountsManager()">Back</button></div>';
  openModal('ovAdmin');
}
function saveAccount(id){
  if(!can('accounts'))return;
  var email=gv('ac_email').trim().toLowerCase();if(!email){alert('Email is required.');return;}
  var pass=gv('ac_pass');if(!pass){alert('Password is required.');return;}
  var dup=(D.accounts||[]).find(function(x){return x.email.toLowerCase()===email&&x.id!==id;});if(dup){alert('That email already has an account.');return;}
  var progIds=[],cbs=document.querySelectorAll('.ac_prog');for(var i=0;i<cbs.length;i++)if(cbs[i].checked)progIds.push(cbs[i].value);
  var data={email:email,name:gv('ac_name').trim()||email,password:pass,role:gv('ac_role'),programIds:progIds,memberId:gv('ac_member')||'',active:document.getElementById('ac_active').checked};
  if(!D.accounts)D.accounts=[];
  if(id){var ac=D.accounts.find(function(x){return x.id===id;});if(ac){Object.assign(ac,data);if(ME&&ME.id===id)ME=ac;}}
  else{data.id=uid();D.accounts.push(data);}
  save();openAccountsManager();
}
function delAccount(id){if(!can('accounts'))return;if(ME&&ME.id===id){alert('You cannot delete your own account.');return;}var tgt=(D.accounts||[]).find(function(a){return a.id===id;});if(tgt&&tgt.role==='admin'&&D.accounts.filter(function(a){return a.role==='admin';}).length<=1){alert('Cannot delete the last admin.');return;}if(!confirm('Delete this account?'))return;D.accounts=D.accounts.filter(function(a){return a.id!==id;});save();openAccountsManager();}
/* ── AUTH & PERMISSIONS (client-side roles only — not API security) ── */
var AUTH_USER='khaja@communityforce.com',AUTH_PASS='Namtra_CF27',DEFAULT_PW='CommunityForce2026';
var ME=null;
var SECTIONS=[{k:'org',tab:'tabOrg',l:'Department View'},{k:'orgchart',tab:'tabChart',l:'Org Chart'},{k:'proj',tab:'tabProj',l:'Projects'},{k:'recruit',tab:'tabRecruit',l:'Recruiting'},{k:'init',tab:'tabInit',l:'Initiatives'},{k:'opp',tab:'tabOpp',l:'Opportunities'},{k:'over',tab:'tabOver',l:'Overhead'},{k:'res',tab:'tabRes',l:'Resources View'},{k:'class',tab:'tabClass',l:'Classification View'},{k:'plan',tab:'tabPlan',l:'COE Plan'},{k:'ptask',tab:'tabPTask',l:'Project Tasks'}];
function emailFromName(name){var clean=(name||'').replace(/\(.*?\)/g,'').replace(/[^A-Za-z .\-]/g,'').trim();var parts=clean.split(/\s+/).filter(Boolean);var local=parts.length>=2?(parts[0]+'.'+parts[parts.length-1]):(parts[0]||'user');return local.toLowerCase().replace(/[^a-z0-9.]/g,'')+'@communityforce.com';}
function authMigrate(){
  if(!D.accounts)D.accounts=[];
  if(!D.accounts.length){D.accounts.push({id:'acct_admin',email:AUTH_USER,name:'Khaja Syed',password:AUTH_PASS,role:'admin',programIds:[],memberId:'khaja',active:true});}
  if(!D.accountsSeeded){
    var taken={};D.accounts.forEach(function(a){taken[(a.email||'').toLowerCase()]=true;});
    var linked={};D.accounts.forEach(function(a){if(a.memberId)linked[a.memberId]=true;});
    var seenName={};
    planMembers().forEach(function(m){
      if(linked[m.id]||seenName[m.name])return;seenName[m.name]=true;
      var email=emailFromName(m.name);if(taken[email])return;taken[email]=true;
      D.accounts.push({id:uid(),email:email,name:m.name,password:DEFAULT_PW,role:'editor',programIds:[],memberId:m.id,active:true});
    });
    D.accountsSeeded=true;
  }
  D.accounts.forEach(function(a){if(!('active' in a))a.active=true;if(!a.programIds)a.programIds=[];if(!a.role)a.role='viewer';});
  if(!D.sectionVis)D.sectionVis={};['owner','editor','viewer'].forEach(function(r){if(!D.sectionVis[r])D.sectionVis[r]={};});
}
function canSee(k){if(!ME)return false;if(ME.role==='admin')return true;if(k==='recruit')return canRecruit();var rv=D.sectionVis&&D.sectionVis[ME.role];return rv?rv[k]!==false:true;}
function canRecruit(){
  if(!ME)return false;
  if(ME.role==='admin'||ME.role==='editor')return true;
  if(ME.memberId){var f=findMember(ME.memberId);if(f&&f.m&&f.m.recruiter)return true;}
  return false;
}
function can(act,ctx){
  if(!ME)return false;
  var r=ME.role;
  if(r==='admin')return true;
  switch(act){
    case 'accounts':return false;
    case 'programs':return r==='editor';
    case 'globals':return r==='editor';
    case 'import':return r==='editor';
    case 'task':case 'addtask':case 'update':
      if(r==='editor')return true;
      if(r==='owner')return !!ctx&&(ME.programIds||[]).indexOf(ctx)>-1;
      return false;
    default:return r==='editor';
  }
}
function applyRoleUI(){
  var adm=document.getElementById('hb_admin');if(adm)adm.style.display=ME?'':'none';
  var bell=document.getElementById('hb_bell');if(bell)bell.style.display=ME?'':'none';
  SECTIONS.forEach(function(s){var el=document.getElementById(s.tab);if(el){el.style.display=canSee(s.k)?'':'none';el.className='tab'+(viewMode===s.k?' active':'');}});
  var badge=document.getElementById('userBadge');if(badge&&ME)badge.innerHTML=esc(ME.name)+' <span style="opacity:0.7">· '+ROLE_LABELS[ME.role]+'</span>';
  renderNotifBadge();
}
function currentAccount(){
  try{var u=sessionStorage.getItem('cf_user');if(u){var ac=(D.accounts||[]).find(function(a){return a.id===u;});if(ac&&ac.active!==false)return ac;}
  if(sessionStorage.getItem('cf_auth')==='1')return (D.accounts||[]).find(function(a){return a.role==='admin';})||null;}catch(e){}
  return null;
}
function doLogin(){
  var u=(document.getElementById('loginUser').value||'').trim().toLowerCase();
  var p=document.getElementById('loginPass').value||'';
  var ac=(D.accounts||[]).find(function(a){return a.email.toLowerCase()===u&&a.password===p&&a.active!==false;});
  if(!ac&&u===AUTH_USER&&p===AUTH_PASS)ac=(D.accounts||[]).find(function(a){return a.role==='admin';});
  if(ac){ME=ac;try{sessionStorage.setItem('cf_user',ac.id);sessionStorage.setItem('cf_auth','1');}catch(e){}document.getElementById('loginOv').style.display='none';renderView();}
  else{document.getElementById('loginErr').textContent='Invalid email or password.';}
}
function logout(){try{sessionStorage.removeItem('cf_user');sessionStorage.removeItem('cf_auth');}catch(e){}ME=null;location.reload();}
async function initApp(){
  await bootstrapData();
  ME=currentAccount();
  if(ME){document.getElementById('loginOv').style.display='none';renderView();}
  else{var ov=document.getElementById('loginOv');ov.style.display='flex';document.getElementById('loginUser').focus();}
}
initApp();
</script>
