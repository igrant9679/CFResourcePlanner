/* ── PERSON FILE / RESUME ATTACHMENTS ── */
function findMember(mid){var res=null;D.departments.forEach(function(d){d.members.forEach(function(m){if(m.id===mid)res={m:m,d:d};});});return res;}
function renderMemberAtt(mid){var f=findMember(mid);if(!f)return '';var a=f.m.attachments||[];if(!a.length)return '<div style="font-size:11px;color:var(--text-muted)">No files yet</div>';return a.map(function(at,i){var isFile=at.type==='file';return '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px solid #F1F5F9"><a href="'+esc(at.url)+'" target="_blank" rel="noopener"'+(isFile?' download="'+esc(at.name||'file')+'"':'')+' style="font-size:12px;color:var(--navy);font-weight:600;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(isFile?'&#128196;':'&#128279;')+' '+esc(at.name||at.url)+'</a><button class="btn btn-danger-sm btn-sm" onclick="memberDelAtt(\''+mid+'\','+i+')">&#10005;</button></div>';}).join('');}
function memberUpload(mid){var f=findMember(mid);if(!f)return;var inp=document.getElementById('e_att_file');var file=inp&&inp.files&&inp.files[0];if(!file){alert('Choose a file first.');return;}var btn=document.getElementById('e_att_btn');if(btn){btn.disabled=true;btn.textContent='Uploading…';}var fd=new FormData();fd.append('file',file);fetch('/api/attachments',{method:'POST',body:fd}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(a){if(!f.m.attachments)f.m.attachments=[];f.m.attachments.push({id:a.id,name:a.name,url:a.url,type:'file',size:a.size});save();document.getElementById('e_att_list').innerHTML=renderMemberAtt(mid);if(inp)inp.value='';}).catch(function(e){alert('Upload failed: '+e.message);}).then(function(){if(btn){btn.disabled=false;btn.innerHTML='&#8593; Upload';}});}
function memberAddLink(mid){var f=findMember(mid);if(!f)return;var url=gv('e_att_url').trim();if(!url)return;if(!/^https?:\/\//i.test(url))url='https://'+url;var nm=gv('e_att_name').trim()||url;if(!f.m.attachments)f.m.attachments=[];f.m.attachments.push({name:nm,url:url,type:'link'});save();document.getElementById('e_att_list').innerHTML=renderMemberAtt(mid);document.getElementById('e_att_name').value='';document.getElementById('e_att_url').value='';}
function memberDelAtt(mid,idx){var f=findMember(mid);if(!f)return;var a=(f.m.attachments||[])[idx];if(a&&a.type==='file'&&a.id){fetch('/api/attachments/'+a.id,{method:'DELETE'}).catch(function(){});}(f.m.attachments||[]).splice(idx,1);save();document.getElementById('e_att_list').innerHTML=renderMemberAtt(mid);}
function renderView(){
  if(ME&&!canSee(viewMode)){var f=SECTIONS.find(function(s){return canSee(s.k);});if(f)viewMode=f.k;}
  applyRoleUI();renderStats();
  var q=(document.getElementById('searchInput').value||'').toLowerCase().trim();var html;
  if(viewMode==='org')html=renderOrgView(q);
  else if(viewMode==='proj')html=renderProjView(q,'project');
  else if(viewMode==='init')html=renderProjView(q,'initiative');
  else if(viewMode==='opp')html=renderOppView(q);
  else if(viewMode==='over')html=renderProjView(q,'overhead');
  else if(viewMode==='orgchart')html=renderOrgChartView(q);
  else if(viewMode==='plan'||viewMode==='ptask')html=renderPlanView(q);
  else if(viewMode==='class')html=renderClassificationView(q);

/* ── RESOURCES VIEW ── */
function renderResourcesView(q){
var all=allM(),byLoc={},locOrder=[];
all.forEach(function(m){
  if(q&&!memberMatchesSearch(m,q))return;
  var key=m.location||'_none';
  if(!byLoc[key]){byLoc[key]=[];locOrder.push(key);}
  byLoc[key].push(m);});
if(!locOrder.length)return '<div class="empty-msg">'+(q?'No resources match &ldquo;'+esc(q)+'&rdquo;':'No resources yet')+'</div>';
var defOrd=(D.locations||[]).map(function(l){return l.id;});
locOrder.sort(function(a,b){
  if(a==='_none')return 1;if(b==='_none')return -1;
  var ai=defOrd.indexOf(a),bi=defOrd.indexOf(b);
  if(ai<0)ai=99;if(bi<0)bi=99;
  return ai-bi;
});
var html='';
locOrder.forEach(function(lid){
  var loc=(D.locations||[]).find(function(l){return l.id===lid;});
  var lname=loc?loc.name:(lid==='_none'?'No location set':lid);
  var cnt=byLoc[lid].length;
  var totalCost=byLoc[lid].reduce(function(s,m){return s+(m.cost||0);},0);
  html+='<div class="res-dept-lbl">'
    +'<span class="res-dept-dot" style="background:#C5A55A;box-shadow:0 0 6px #C5A55A88"></span>'
    +'&#128205; '+esc(lname)+'<span style="font-size:10px;font-weight:400;color:var(--text-muted);margin-left:4px">'+cnt+' '+(cnt===1?'person':'people')+' &middot; '+fmt(totalCost)+'/mo</span>'
    +'</div><div class="res-grid">';
  byLoc[lid].forEach(function(m){html+=cardHTML(m,m._dept);});
  html+='</div>';});
return html;}

/* ── CLASSIFICATION VIEW ── */
var CLASSIFICATIONS=[
  {k:'sme',l:'SME',c:'#7C5CBF'},
  {k:'hub',l:'Hub',c:'#0D9488'},
  {k:'associate',l:'Associate',c:'#D97706'},
  {k:'proposal',l:'Proposal',c:'#059669'},
  {k:'recruiter',l:'Recruiter',c:'#7C3AED'}
];
function renderClassificationView(q){
  var all=allM().filter(function(m){return !q||memberMatchesSearch(m,q);});
  if(!all.length)return '<div class="empty-msg">'+(q?'No resources match &ldquo;'+esc(q)+'&rdquo;':'No resources yet')+'</div>';
  var html='';
  CLASSIFICATIONS.forEach(function(c){
    var people=all.filter(function(m){return !!m[c.k];});
    if(!people.length)return;
    var cost=people.reduce(function(s,m){return s+(m.cost||0);},0);
    html+='<div class="class-card">'
      +'<div class="class-card-hdr">'
        +'<span class="class-card-dot" style="background:'+c.c+';box-shadow:0 0 6px '+c.c+'88"></span>'
        +'<span class="class-card-ttl" style="color:'+c.c+'">'+c.l+'<span class="class-card-sub">'+people.length+' '+(people.length===1?'person':'people')+' &middot; '+fmt(cost)+'/mo</span></span>'
      +'</div>'
      +'<div class="res-grid">'+people.map(function(m){return cardHTML(m,m._dept);}).join('')+'</div>'
      +'</div>';
  });
  var unclassified=all.filter(function(m){return !CLASSIFICATIONS.some(function(c){return m[c.k];});});
  if(unclassified.length){
    var cost=unclassified.reduce(function(s,m){return s+(m.cost||0);},0);
    html+='<div class="class-card">'
      +'<div class="class-card-hdr">'
        +'<span class="class-card-dot" style="background:#94A3B8"></span>'
        +'<span class="class-card-ttl" style="color:#64748B">Unclassified<span class="class-card-sub">'+unclassified.length+' '+(unclassified.length===1?'person':'people')+' &middot; '+fmt(cost)+'/mo</span></span>'
      +'</div>'
      +'<div class="res-grid">'+unclassified.map(function(m){return cardHTML(m,m._dept);}).join('')+'</div>'
      +'</div>';
  }
  return html||'<div class="empty-msg">No classified resources yet. Edit a person to set Hub / SME / Associate / Proposal / Recruiter.</div>';
}

/* ── TASK TEMPLATES MANAGER (admin-only modal) ── */
function openTaskTemplatesManager(){
  if(!ME)return;
  var canEdit=ME.role==='admin'||ME.role==='editor';
  var tpls=D.taskTemplates||[];
  var rows=tpls.map(function(t){
    var usage=D.activities.filter(function(a){return a.templateId===t.id;}).length;
    return '<div class="tpl-row">'
      +(canEdit?'<input value="'+esc(t.name)+'" onchange="tplUpdateName(\''+t.id+'\',this.value)">':'<span style="flex:1;font-size:13px;font-weight:600">'+esc(t.name)+'</span>')
      +'<span style="font-size:11px;color:var(--text-muted);min-width:90px;text-align:right">'+usage+' in use</span>'
      +(canEdit?'<button class="btn btn-danger-sm btn-sm" onclick="tplDel(\''+t.id+'\')" title="Delete template">&#10005;</button>':'')
      +'</div>';
  }).join('')||'<div style="padding:14px;text-align:center;font-size:12px;color:var(--text-muted)">No task templates yet.</div>';
  document.getElementById('mdlTpl').innerHTML=
    '<div class="mdl-over">Administration</div><div class="mdl-title">Task Templates</div>'
    +'<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">Repeatable workflow tasks. Selecting a template inside an opportunity creates a Project Task named <code>Task_&lt;OppName&gt;_&lt;Customer&gt;</code>.</div>'
    +'<div class="tpl-wrap">'+rows+'</div>'
    +'<div class="btn-row" style="margin-top:14px">'
      +(canEdit?'<button class="btn btn-gold" style="flex:1" onclick="tplAdd()">+ Add Template</button>':'')
      +'<button class="btn btn-sec" style="flex:1" onclick="closeModal(\'ovTpl\')">Close</button>'
    +'</div>';
  openModal('ovTpl');
}
function tplAdd(){
  openFormModal({over:'Administration',title:'Add Task Template',submitLabel:'Add Template',
    fields:[{key:'name',label:'Template name',type:'text',required:true,placeholder:'e.g. Perform Lead Generation'}],
    onSubmit:function(v){if(!D.taskTemplates)D.taskTemplates=[];D.taskTemplates.push({id:uid(),name:v.name.trim()});save();openTaskTemplatesManager();}
  });
}
function tplUpdateName(id,val){
  var t=(D.taskTemplates||[]).find(function(x){return x.id===id;});
  if(!t)return;t.name=(val||'').trim()||t.name;save();
}
function tplDel(id){
  var inUse=D.activities.filter(function(a){return a.templateId===id;}).length;
  if(!confirm('Delete this template?'+(inUse?'\n\n'+inUse+' task(s) currently reference it — they will be kept but unlinked from this template.':'')))return;
  D.activities.forEach(function(a){if(a.templateId===id)a.templateId='';});
  D.taskTemplates=(D.taskTemplates||[]).filter(function(t){return t.id!==id;});
  save();openTaskTemplatesManager();
}

      +'<td style="font-weight:600">'+esc(t.subtask||'(untitled)')+'</td>'
      +'<td><select class="fld-sel" onchange="oppTaskAssign(\''+t.id+'\',this.value)">'+ownerOpts+'</select></td>'
      +'<td><select class="fld-sel" style="background:'+sc.c+'14;border-color:'+sc.c+'66" onchange="oppTaskStatus(\''+t.id+'\',\''+opp.id+'\',this.value)">'+stsOpts+'</select></td>'
      +'<td><input class="fld-i" type="date" value="'+esc(t.dueDate||'')+'" onchange="oppTaskDue(\''+t.id+'\',this.value)" style="padding:5px 7px;font-size:11px"></td>'
      +'<td style="white-space:nowrap"><button class="btn btn-sec btn-sm" type="button" onclick="openPlanModal(\''+t.id+'\')">Open</button> '
      +'<button class="btn btn-danger-sm btn-sm" type="button" onclick="oppRemoveTask(\''+t.id+'\',\''+opp.id+'\')" title="Remove from workflow">&#10005;</button></td>'

  }).join(''):'<tr><td colspan="5" style="text-align:center;color:var(--text-muted);font-size:11px;padding:14px">No workflow tasks yet. Click a template above to add one.</td></tr>';

function saveRecruit(id){

function saveCand(id,reqId){
  var name=gv('cand_name').trim();if(!name){alert('Candidate name is required.');return;}
  var data={
    recruitingId:reqId,
    name:name,
    location:gv('cand_loc').trim(),
    workAuth:gv('cand_wa'),
    salaryK:Number(gv('cand_sal'))||0,
    clearance:gv('cand_clr'),
    availability:gv('cand_avail').trim(),
    source:{kind:gv('cand_src_kind'),agency:gv('cand_src_agency').trim(),referrerId:gv('cand_src_ref')||''},
    status:gv('cand_status')||'new',
    notes:gv('cand_notes').trim()
  };
  if(document.getElementById('cand_off_amt')){
    data.offer={
      amount:Number(gv('cand_off_amt'))||0,
      signingBonus:Number(gv('cand_off_sb'))||0,
      startDate:gv('cand_off_sd')||'',
      state:gv('cand_off_state')||'',
      counterNotes:gv('cand_off_notes').trim()
    };
  }
  if(document.getElementById('cand_rejreason')){
    data.rejectionReason=gv('cand_rejreason');
    data.rejectionNote=gv('cand_rejnote').trim();
  }
  if(id){
    var c=D.candidates.find(function(x){return x.id===id;});if(!c)return;
    var oldSts=c.status;
    Object.assign(c,data);
    if(oldSts!==c.status){
      candLog(id,'status.changed',{from:oldSts,to:c.status});
      var req=(D.recruitings||[]).find(function(r){return r.id===c.recruitingId;});
      if(req&&(c.status==='offer'||c.status==='hired'||c.status==='rejected'))pushNotifMulti([req.busDevId,req.pmId],'status-changed','candidate',c.id,c.name+' moved to '+c.status+' on '+(req.jdTitle||'requisition'));
    }
    if(data.offer&&data.offer.state==='Accepted'&&!(c.events||[]).some(function(e){return e.type==='offer.accepted';}))candLog(id,'offer.accepted',{amount:data.offer.amount});
    save();closeModal('ovCand');renderView();
    // Reopen requisition to refresh the embedded board
    openRecruitModal(reqId);
  } else {
    var dup=candFindDup(name);
    if(dup&&!confirm('A candidate named "'+name+'" already exists in '+(dup.recruitingId===reqId?'this requisition.':'another requisition.')+'\n\nCreate anyway?'))return;
    data.id=uid();data.createdAt=Date.now();data.createdBy=ME?ME.id:'';data.interviews=[];data.events=[];data.resume=null;
    if(!data.offer)data.offer={amount:0,signingBonus:0,startDate:'',state:'',counterNotes:''};
    D.candidates.push(data);
    candLog(data.id,'candidate.created',{name:name,reqId:reqId});
    save();closeModal('ovCand');
    openRecruitModal(reqId);
  }
}
function delCand(id,reqId){
  if(!confirm('Delete this candidate? Resume file (if any) will be removed too.'))return;
  var c=D.candidates.find(function(x){return x.id===id;});
  if(c&&c.resume&&c.resume.id){fetch('/api/attachments/'+c.resume.id,{method:'DELETE'}).catch(function(){});}
  D.candidates=D.candidates.filter(function(x){return x.id!==id;});
  save();closeModal('ovCand');openRecruitModal(reqId);
}
function candReplaceResume(){var inp=document.getElementById('cand_resumefile');if(inp)inp.click();}
function candUploadResume(id){
  var c=D.candidates.find(function(x){return x.id===id;});if(!c)return;
  var inp=document.getElementById('cand_resumefile');if(!inp||!inp.files||!inp.files[0])return;
  var fd=new FormData();fd.append('file',inp.files[0]);
  fetch('/api/attachments',{method:'POST',body:fd}).then(function(r){if(!r.ok)throw new Error('upload failed');return r.json();}).then(function(a){
    if(c.resume&&c.resume.id)fetch('/api/attachments/'+c.resume.id,{method:'DELETE'}).catch(function(){});
    c.resume={id:a.id,name:a.name,url:a.url,mime:a.mime,size:a.size,uploadedAt:Date.now(),uploadedBy:ME?ME.id:''};
    candLog(id,'resume.uploaded',{name:a.name});
    // Notify BusDev + PM on the requisition
    var req=(D.recruitings||[]).find(function(r){return r.id===c.recruitingId;});
    if(req)pushNotifMulti([req.busDevId,req.pmId],'resume-uploaded','candidate',c.id,'Resume uploaded for '+c.name+' on '+(req.jdTitle||'requisition'));
    save();openCandModal(c.recruitingId,id);
  }).catch(function(e){alert('Upload failed: '+e.message);});
}
function candDelResume(id){
  if(!confirm('Remove resume?'))return;
  var c=D.candidates.find(function(x){return x.id===id;});if(!c||!c.resume)return;
  if(c.resume.id)fetch('/api/attachments/'+c.resume.id,{method:'DELETE'}).catch(function(){});
  c.resume=null;candLog(id,'resume.removed',{});save();openCandModal(c.recruitingId,id);
}
function candAddInterview(id){
  var c=D.candidates.find(function(x){return x.id===id;});if(!c)return;
  var when=gv('cand_iv_when');
  var sel=document.getElementById('cand_iv_who');
  var ids=[];if(sel){for(var i=0;i<sel.options.length;i++){if(sel.options[i].selected)ids.push(sel.options[i].value);}}
  var notes=gv('cand_iv_notes').trim();
  if(!when&&!ids.length){alert('Pick a date/time or at least one interviewer.');return;}
  if(!c.interviews)c.interviews=[];
  var iv={id:uid(),dateTime:when,interviewerIds:ids,outcome:'',notes:notes,createdAt:Date.now()};
  c.interviews.push(iv);
  if(c.status==='new'||c.status==='screening')c.status='interviewing';
  candLog(id,'interview.scheduled',{when:when,interviewers:ids});
  // Notify selected interviewers
  var req=(D.recruitings||[]).find(function(r){return r.id===c.recruitingId;});
  var whenLbl=when?(' on '+when.replace('T',' ')):'';
  pushNotifMulti(ids,'interview-scheduled','candidate',c.id,'Interview with '+c.name+whenLbl+' ('+((req&&req.jdTitle)||'requisition')+')');
  save();openCandModal(c.recruitingId,id);
}
function candUpdInterview(candId,ivId,field,val){
  var c=D.candidates.find(function(x){return x.id===candId;});if(!c)return;
  var iv=(c.interviews||[]).find(function(x){return x.id===ivId;});if(!iv)return;
  iv[field]=val;
  if(field==='outcome'&&val){
    candLog(candId,'interview.outcome',{ivId:ivId,outcome:val});
    var req=(D.recruitings||[]).find(function(r){return r.id===c.recruitingId;});
    if(req)pushNotifMulti([req.busDevId,req.pmId],'outcome-recorded','candidate',c.id,'Interview outcome ('+val+') recorded for '+c.name+' on '+(req.jdTitle||'requisition'));
  }
  save();
}
function candDelInterview(candId,ivId){
  if(!confirm('Delete this interview?'))return;
  var c=D.candidates.find(function(x){return x.id===candId;});if(!c)return;
  c.interviews=(c.interviews||[]).filter(function(x){return x.id!==ivId;});
  candLog(candId,'interview.removed',{ivId:ivId});save();openCandModal(c.recruitingId,candId);
}
function candHire(id){
  var c=D.candidates.find(function(x){return x.id===id;});if(!c)return;
  if(c.status==='hired'){toast(c.name+' is already marked Hired.','info');return;}
  if(!confirm('Mark '+c.name+' as Hired? You can then optionally create a Department member pre-filled from their data.'))return;
  c.status='hired';
  if(c.offer)c.offer.state=c.offer.state||'Accepted';
  candLog(id,'hired',{});save();
  var deptOpts=D.departments.map(function(d){return {value:d.id,label:d.name};});
  openFormModal({over:'Recruiting',title:'Hire — Create Member (optional)',submitLabel:'Done',
    intro:c.name+' is now Hired. Optionally create a Department member pre-filled from their candidate data (cost = salary ÷ 12, resume attached).',
    fields:[{key:'dept',label:'Add to department',type:'select',options:[{value:'',label:'— skip, don\'t create a member —'}].concat(deptOpts)}],
    onSubmit:function(v){
      if(v.dept){
        var dept=D.departments.find(function(d){return d.id===v.dept;});
        if(dept){
          var monthlyCost=c.salaryK?Math.round(c.salaryK*1000/12):0;
          var newM={id:uid(),name:c.name,role:'',cost:monthlyCost,badge:'',projects:[],skillsets:[],reportsTo:'',hub:false,sme:false,associate:false,proposal:false,recruiter:false,note:'Hired from candidate '+c.id,reassess:false,location:'',clearance:'',certifications:[],pastProjects:[],pastClients:[],attachments:[],resumeLink:''};
          var clMatch=(D.clearances||[]).find(function(x){return x.name.toLowerCase()===(c.clearance||'').toLowerCase();});
          if(clMatch)newM.clearance=clMatch.id;
          if(c.resume){newM.attachments.push({id:c.resume.id,name:c.resume.name,url:c.resume.url,type:'file',size:c.resume.size});}
          dept.members.push(newM);
          candLog(id,'member.created',{memberId:newM.id,deptId:dept.id});
          toast('Created member entry for '+c.name+' in '+dept.name+'.','success');
        }
      }
      save();openCandModal(c.recruitingId,id);
    }
  });
}

function propStatusCfg(k){return (PROP_STATUSES.find(function(s){return s.k===k;}))||PROP_STATUSES[0];}
function propCardsHTML(props){
  return props.slice().sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0);}).map(function(p){
    var s=propStatusCfg(p.status);
    var opp=p.opportunityId?D.projects.find(function(x){return x.id===p.opportunityId;}):null;
    var tpl=p.templateId?(D.proposalTemplates||[]).find(function(x){return x.id===p.templateId;}):null;

      +'<div class="prop-card-hdr">'

function cpToggleTone(e){
  var t=e.target;if(t.tagName!=='LABEL'&&!t.dataset)t=t.closest('label');if(!t)return;
  var input=t.querySelector('input[data-tone]');if(!input)return;
  input.checked=!input.checked;t.classList.toggle('cp-tag-on',input.checked);
}
function cpSaveIdentity(){
  var p=D.companyProfile;p.identity=p.identity||{};
  p.identity.legalName=gv('cp_legal').trim();
  p.identity.dba=gv('cp_dba').trim();
  p.identity.foundedYear=gv('cp_founded').trim();
  p.identity.duns=gv('cp_duns').trim();
  p.identity.uei=gv('cp_uei').trim();
  p.identity.cage=gv('cp_cage').trim();
  p.identity.employeeCount=gv('cp_emp').trim();
  p.identity.naics=gv('cp_naics').split(',').map(function(s){return s.trim();}).filter(Boolean);
  p.identity.ownershipType=gv('cp_owner').trim();
  // Tones
  var tones=[];document.querySelectorAll('#cp_tones input[data-tone]').forEach(function(i){if(i.checked)tones.push(i.value);});
  p.voice=p.voice||{};p.voice.toneTags=tones;
  p.governance=p.governance||{};p.governance.lastReviewedAt=Date.now();p.governance.ownerId=ME?ME.id:'';
  save();closeModal('ovCP');renderView();

/* ── KNOWLEDGE BANK (Phase 1) ──
   Past proposals + capability/reference docs the Proposal Generator pulls from.
   Heavy extracted text lives in the knowledge_docs Postgres table; D.knowledgeBank
   holds only lightweight metadata {id,name,type,summary,tags,chars,...}. */
var KB_TYPES=[
  {k:'past-proposal',l:'Past Proposal'},
  {k:'capability',l:'Capability / Cap Statement'},
  {k:'case-study',l:'Case Study / Past Performance'},
  {k:'pricing',l:'Pricing Reference'},
  {k:'boilerplate',l:'Boilerplate / Reference'},
  {k:'other',l:'Other'}
];
function kbTypeLabel(k){var t=KB_TYPES.find(function(x){return x.k===k;});return t?t.l:(k||'Other');}
function kbStatus(msg){var el=document.getElementById('kb_status');if(el)el.textContent=msg||'';}
function openKnowledgeBankManager(){
  if(!canProposal()){alert('You don\'t have permission.');return;}
  D.knowledgeBank=D.knowledgeBank||[];
  var docs=D.knowledgeBank;
  var typeOpts=KB_TYPES.map(function(t){return '<option value="'+t.k+'">'+esc(t.l)+'</option>';}).join('');
  var rows=docs.length?docs.map(function(d){
    var tags=(d.tags||[]).map(function(t){return '<span class="kb-tag">'+esc(t)+'</span>';}).join('');
    var busy=d._busy?'<span style="font-size:11px;color:#7C3AED;margin-left:6px">&#8635; summarizing&hellip;</span>':'';
    var sum=d.summary?esc(d.summary):'<i style="color:var(--text-muted)">No summary yet &mdash; click Re-summarize.</i>';
    return '<div class="kb-card">'
      +'<div style="flex:1;min-width:0">'
      +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="kb-name">'+esc(d.name)+'</span><span class="kb-type">'+esc(kbTypeLabel(d.type))+'</span>'+busy+'</div>'
      +'<div class="kb-sum">'+sum+'</div>'
      +(tags?'<div class="kb-tags">'+tags+'</div>':'')
      +'<div class="kb-meta">'+(d.chars||0).toLocaleString()+' chars &middot; added '+(d.createdAt?new Date(d.createdAt).toLocaleDateString():'')+'</div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">'
      +'<a class="btn btn-sec btn-sm" href="/api/knowledge/'+esc(d.id)+'/raw" target="_blank" rel="noopener">Open</a>'
      +'<button class="btn btn-sec btn-sm" onclick="kbResummarize(\''+d.id+'\')">Re-summarize</button>'
      +'<button class="btn btn-danger-sm btn-sm" onclick="kbDelete(\''+d.id+'\')">Delete</button>'
      +'</div></div>';
  }).join(''):'<div style="font-size:12px;color:var(--text-muted);text-align:center;padding:24px">Knowledge Bank is empty. Upload past proposals, capability statements, and reference docs (PDF / DOCX / TXT) or paste text. The Proposal Generator selects relevant sources from here when drafting.</div>';
  document.getElementById('mdlKB').innerHTML=
    '<div class="mdl-over">Proposals</div><div class="mdl-title">Knowledge Bank</div>'
    +'<div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">CommunityForce history &amp; capabilities. Atlas extracts the text, summarizes it, and the Proposal Generator picks the relevant sources when drafting a new proposal. Original files and full text are stored server-side; only summaries sync in the app state.</div>'
    +'<div class="kb-upload-row">'
    +'<select id="kb_type" class="inp" style="max-width:230px">'+typeOpts+'</select>'
    +'<input type="file" id="kb_file" class="inp" accept=".pdf,.docx,.txt,.md,.csv,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain" style="flex:1;min-width:160px"/>'
    +'<button class="btn btn-gold btn-sm" onclick="kbUpload()">Upload</button>'
    +'<button class="btn btn-outline btn-sm" onclick="kbPasteText()">Paste Text&hellip;</button>'
    +'</div>'
    +'<div id="kb_status" style="font-size:11px;color:#7C3AED;min-height:16px;margin:6px 2px"></div>'
    +'<div class="kb-list">'+rows+'</div>'
    +'<div class="btn-row" style="margin-top:14px"><button class="btn btn-sec" style="flex:1" onclick="closeModal(\'ovKB\')">Close</button></div>';
  openModal('ovKB');
}
function kbUpload(){
  var f=document.getElementById('kb_file');var type=gv('kb_type')||'other';
  if(!f||!f.files||!f.files[0]){alert('Choose a file first.');return;}
  var file=f.files[0];
  kbStatus('Uploading & extracting text from '+file.name+'…');
  var fd=new FormData();fd.append('file',file);fd.append('docType',type);
  fetch('/api/knowledge',{method:'POST',body:fd}).then(function(r){return r.json().then(function(j){if(!r.ok)throw new Error(j&&j.error||'upload failed');return j;});}).then(function(j){
    var doc={id:j.id,name:j.name,type:type,summary:'',tags:[],chars:j.chars||0,mime:j.mime||'',createdAt:Date.now(),createdBy:ME?ME.id:''};
    D.knowledgeBank=D.knowledgeBank||[];D.knowledgeBank.unshift(doc);save();
    if(!j.chars){kbStatus('Uploaded "'+j.name+'", but no text could be extracted (unsupported format or scanned PDF). Kept as a reference.');openKnowledgeBankManager();return;}
    kbSummarizeDoc(doc.id,j.text||'');
  }).catch(function(e){kbStatus('');alert('Upload failed: '+e.message);});
}

    ],
    onSubmit:function(v,files,setStatus){
      setStatus('Saving…');
      fetch('/api/knowledge/text',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:v.name.trim(),docType:v.type,text:v.text})}).then(function(r){return r.json().then(function(j){if(!r.ok)throw new Error(j&&j.error||'failed');return j;});}).then(function(j){
        var doc={id:j.id,name:j.name,type:v.type,summary:'',tags:[],chars:j.chars||0,mime:'text/plain',createdAt:Date.now(),createdBy:ME?ME.id:''};
        D.knowledgeBank=D.knowledgeBank||[];D.knowledgeBank.unshift(doc);save();
        closeModal('ovForm');kbSummarizeDoc(doc.id,v.text);

// AI summary + tag pass. If text isn't supplied, pull it back from the server.
function kbSummarizeDoc(id,text){
  var doc=(D.knowledgeBank||[]).find(function(x){return x.id===id;});if(!doc)return;
  doc._busy=true;kbStatus('Summarizing "'+doc.name+'" with AI…');openKnowledgeBankManager();
  function run(t){
    var clipped=String(t||'').slice(0,16000);
    if(!clipped){delete doc._busy;kbStatus('No text available to summarize for "'+doc.name+'".');save();openKnowledgeBankManager();return;}
    var sys='You catalog documents for a proposal knowledge bank at a federal contractor (CommunityForce). Respond ONLY with JSON, no prose.';
    var instr='Document name: '+doc.name+'\nType: '+kbTypeLabel(doc.type)+'\n\nContent (may be truncated):\n"""\n'+clipped+'\n"""\n\nReturn JSON exactly: {"summary":"2-4 sentences on what this document covers and why it is useful for writing future proposals — name the customers/agencies, capabilities, win themes, and scope","tags":["6-10 short lowercase keywords: customers, agencies, technologies, capabilities, contract vehicles"]}';
    llmComplete({system:sys,messages:[{role:'user',content:instr}],max_tokens:700}).then(function(resp){
      var j=llmExtractJSON(resp)||{};
      doc.summary=j.summary||'';doc.tags=Array.isArray(j.tags)?j.tags.map(function(x){return String(x);}):[];
      delete doc._busy;save();kbStatus('Summarized "'+doc.name+'".');openKnowledgeBankManager();
    }).catch(function(e){delete doc._busy;save();kbStatus('Summarize failed: '+e.message+' — you can retry with Re-summarize.');openKnowledgeBankManager();});
  }
  if(text)run(text);
  else fetch('/api/knowledge/'+id).then(function(r){return r.json();}).then(function(j){run(j&&j.extracted_text||'');}).catch(function(e){delete doc._busy;kbStatus('Could not load text: '+e.message);openKnowledgeBankManager();});
}
function kbResummarize(id){kbSummarizeDoc(id);}
function kbDelete(id){
  if(!confirm('Delete this document from the Knowledge Bank? This permanently removes the stored file and text.'))return;
  fetch('/api/knowledge/'+id,{method:'DELETE'}).catch(function(){});
  D.knowledgeBank=(D.knowledgeBank||[]).filter(function(x){return x.id!==id;});
  save();openKnowledgeBankManager();
}
/* ── KNOWLEDGE BANK RETRIEVAL (consumed by the Phase 2 generator) ──
   Two-stage select-then-inject: ask the LLM which docs are relevant given their
   summaries, then fetch the full text of only those. No vector DB needed. */
function kbSelectRelevant(contextStr,maxDocs,cb){
  var docs=(D.knowledgeBank||[]).filter(function(d){return d.summary;});
  if(!docs.length){cb([]);return;}
  var n=maxDocs||5;
  var list=docs.map(function(d,i){return (i+1)+'. ['+d.id+'] ('+kbTypeLabel(d.type)+') '+d.name+' — '+d.summary+((d.tags&&d.tags.length)?' [tags: '+d.tags.join(', ')+']':'');}).join('\n');
  var sys='You select which knowledge-bank documents are most relevant to a new proposal. Respond ONLY with JSON.';
  var instr='New proposal context:\n"""\n'+String(contextStr||'').slice(0,6000)+'\n"""\n\nAvailable documents:\n'+list+'\n\nReturn JSON: {"docIds":["up to '+n+' most relevant document ids, most relevant first"]}. Only include genuinely relevant documents.';
  llmComplete({system:sys,messages:[{role:'user',content:instr}],max_tokens:400}).then(function(resp){
    var j=llmExtractJSON(resp)||{};var ids=Array.isArray(j.docIds)?j.docIds:[];
    ids=ids.filter(function(id){return docs.some(function(d){return d.id===id;});}).slice(0,n);
    cb(ids);
  }).catch(function(){cb([]);});
}
function kbFetchTexts(ids,cb){
  if(!ids||!ids.length){cb([]);return;}
  Promise.all(ids.map(function(id){return fetch('/api/knowledge/'+id).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});})).then(function(arr){

function propTplSecField(tid,sid,field,val){
  var t=(D.proposalTemplates||[]).find(function(x){return x.id===tid;});if(!t)return;
  var s=(t.sections||[]).find(function(x){return x.id===sid;});if(!s)return;
  if(field==='pageBudget')s[field]=Number(val)||0;
  else if(field==='required')s[field]=!!Number(val);
  else s[field]=val;
  save();
}
function propTplSecPrompt(tid,sid){
  var t=(D.proposalTemplates||[]).find(function(x){return x.id===tid;});if(!t)return;
  var s=(t.sections||[]).find(function(x){return x.id===sid;});if(!s)return;
  openFormModal({over:'Proposal Templates',title:'Section AI Prompt',submitLabel:'Save Prompt',
    intro:'Per-section instruction Claude uses when this section\'s source is AI or Hybrid.',
    fields:[{key:'prompt',label:'AI prompt for “'+s.title+'”',type:'textarea',rows:6,value:s.prompt||''}],
    onSubmit:function(v){s.prompt=v.prompt;save();propTplEdit(tid);}

function propTplSecDel(tid,sid){
  if(!confirm('Delete this section?'))return;
  var t=(D.proposalTemplates||[]).find(function(x){return x.id===tid;});if(!t)return;
  t.sections=(t.sections||[]).filter(function(x){return x.id!==sid;});
  save();propTplEdit(tid);
}
function propTplSecAdd(tid){
  var t=(D.proposalTemplates||[]).find(function(x){return x.id===tid;});if(!t)return;
  openFormModal({over:'Proposal Templates',title:'Add Section',submitLabel:'Add Section',
    fields:[{key:'title',label:'Section title',type:'text',required:true}],
    onSubmit:function(v){t.sections=t.sections||[];t.sections.push({id:uid(),title:v.title.trim(),order:t.sections.length,required:false,source:'user-only',pageBudget:1,prompt:'',evidence:[]});save();propTplEdit(tid);}
  });
}

function _npUploadRFP(){
  var inp=document.getElementById('np_rfp_file');
  if(!inp||!inp.files||!inp.files[0]){alert('Pick an RFP file first.');return;}
  var f=inp.files[0];

  var fd=new FormData();fd.append('file',f);
  _npState.extracting=true;renderNewProposalModal();
  fetch('/api/attachments',{method:'POST',body:fd}).then(function(r){if(!r.ok)throw new Error('upload failed: '+r.status);return r.json();}).then(function(att){
    _npState.rfpAttachmentId=att.id;
    return _npExtractRFP(att.id);
  }).catch(function(e){
    _npState.extracting=false;
    alert('RFP upload/extraction failed: '+(e&&e.message||e));
    renderNewProposalModal();
  });

function _npReextract(){if(!_npState.rfpAttachmentId)return;_npState.extracting=true;_npState.extracted=null;renderNewProposalModal();_npExtractRFP(_npState.rfpAttachmentId).catch(function(e){_npState.extracting=false;alert('Re-extraction failed: '+(e&&e.message||e));renderNewProposalModal();});}
function _npExtractRFP(attachmentId){
  var sys='You are extracting structured data from a federal government Request for Proposal (RFP), RFI, RFQ, or Statement of Work for a US consulting firm. Output ONLY a JSON object inside a ```json``` code block. Return null for any field you cannot determine from the document. Do not invent.';
  var schema=JSON.stringify({
    customer:'agency or company issuing the RFP',
    summary:'2-3 sentence elevator pitch of what they want',
    scope:'detailed scope of work',
    pop:'period of performance (e.g. "12 months base + 4 options" or "Jul 2026 - Jun 2027")',
    dueDate:'YYYY-MM-DD or null',
    potentialValue:'estimated dollar value (integer) or null',
    contractVehicle:'e.g. GSA STARS III, IDIQ, sole-source, or null',
    setAsideType:'small business, 8(a), WOSB, none, or null',
    requirements:['line item','line item'],
    requiredCerts:['e.g. FedRAMP Moderate','ISO 27001'],
    requiredClearances:['Secret','Top Secret'],
    requiredRoles:[{title:'role name',count:1,skills:['skill','skill'],clearance:'Secret or null',location:'remote / DC / null'}],
    deliverables:['line item','line item'],
    evaluationCriteria:['technical approach 40%','past performance 30%','price 30%'],
    keyDates:[{label:'Q&A deadline',date:'YYYY-MM-DD'}]
  });
  var instruction='Read the attached RFP document. Extract these fields and return ONLY this JSON shape:\n\n'+schema+'\n\nFor lists like requirements/deliverables, return distinct line items (do not bundle multiple into one). For requiredRoles, infer based on staffing/key-personnel sections — return an empty array if none specified. No prose outside the JSON code block.';
  return llmDocComplete({
    attachmentId:attachmentId,
    provider:_npState.provider||undefined,
    model:_npState.model||undefined,
    system:sys,
    instruction:instruction,
    max_tokens:4000
  }).then(function(j){
    var parsed=llmExtractJSON(j);
    if(!parsed)throw new Error('Could not parse RFP extraction response.');
    _npState.extracted=parsed;_npState.extracting=false;
    // Default linked-opportunity behavior: if customer matches an existing opp, suggest linking; otherwise propose creating
    if(parsed.customer){
      var match=D.projects.find(function(p){return projCat(p)==='opportunity'&&(p.customer||p.name).toLowerCase().indexOf(parsed.customer.toLowerCase().slice(0,20))>-1;});
      if(match)_npState.opportunityId=match.id;
      else _npState.createNewOpp=true;
    }
    renderNewProposalModal();
  });
}

    +fld('Requirements ('+((ex.requirements||[]).length)+')',ex.requirements)
    +fld('Deliverables ('+((ex.deliverables||[]).length)+')',ex.deliverables)
    +fld('Evaluation Criteria',ex.evaluationCriteria)
    +(keyDatesHTML?'<div class="np-extract-fld"><div class="np-extract-lbl">Key Dates</div><div class="np-extract-val">'+keyDatesHTML+'</div></div>':'');

function _propAutoCreateOpp(ex){
  // Workflow 2: Opportunity Auto-Provisioning from RFP
  var nm=(ex.customer?ex.customer+' — ':'')+(ex.summary?ex.summary.split(/[.!?]/)[0].slice(0,60):'New Pursuit');
  var newOpp={
    id:uid(),
    name:nm.trim(),
    category:'opportunity',
    revenue:0,
    targetRevenue:Number(ex.potentialValue)||0,
    revenueNote:'',
    description:ex.summary||'',
    parentId:null,
    attachments:_npState.rfpAttachmentId?[{id:_npState.rfpAttachmentId,name:_npState.rfpFileName||'RFP',url:'/api/attachments/'+_npState.rfpAttachmentId,type:'file'}]:[],
    customer:ex.customer||'',
    stage:'Presales',
    status:'Qualified',
    potential:Number(ex.potentialValue)||0,
    closeDate:ex.dueDate||'',
    pm:ME?ME.name:'',
    opr:'',
    team:'',
    leadGen:'',presales:'',sales:'',delivery:''
  };
  D.projects.push(newOpp);
  // Seed Perform Proposal Development task
  var tpl=(D.taskTemplates||[]).find(function(t){return /proposal/i.test(t.name);});
  if(tpl){
    D.activities=D.activities||[];
    D.activities.push({
      id:uid(),kind:'project',projectId:newOpp.id,templateId:tpl.id,programId:'',
      task:'Task_'+(newOpp.name||'New').replace(/[^A-Za-z0-9]+/g,'').slice(0,40),

      start:'',dueDate:ex.dueDate||'',isMilestone:false,parentId:null,
      pm:newOpp.pm||'',ownerText:'',owners:[],
      updates:[],attachments:[],order:D.activities.length
    });
  }
  return newOpp.id;
}

function renderProposalDetail(id){
  var p=(D.proposals||[]).find(function(x){return x.id===id;});if(!p)return;
  var s=propStatusCfg(p.status);
  var opp=p.opportunityId?D.projects.find(function(x){return x.id===p.opportunityId;}):null;
  var tpl=p.templateId?(D.proposalTemplates||[]).find(function(x){return x.id===p.templateId;}):null;
  var due=p.rfp&&p.rfp.dueDate?p.rfp.dueDate:'';
  var dueChip='';
  if(due){var dd=new Date(due);if(!isNaN(dd)){var days=Math.round((dd-Date.now())/86400000);if(days<0)dueChip='<span class="rq-sla rq-sla-red">'+Math.abs(days)+'d overdue</span>';else if(days<14)dueChip='<span class="rq-sla rq-sla-warn">due in '+days+'d</span>';else dueChip='<span class="rq-sla">due in '+days+'d</span>';}}
  var stsOpts=PROP_STATUSES.map(function(s){return '<option value="'+s.k+'"'+(p.status===s.k?' selected':'')+'>'+s.l+'</option>';}).join('');
  var tabGroups=[
    {g:'Content',tabs:[['overview','Overview'],['brief','BusDev Brief'],['sections','Sections']]},
    {g:'Inputs',tabs:[['rfp','RFP Details'],['pp','Past Performance'],['staffing','Staffing']]},
    {g:'Business',tabs:[['pricing','Pricing'],['cover','Cover Sheet']]},
    {g:'Review & Output',tabs:[['redteam','Red Team'],['export','Export'],['files','Files'],['settings','Settings']]}
  ];
  var tabBar='<div class="pd-tabgroups">'+tabGroups.map(function(grp){
    return '<div class="pd-tabgroup"><div class="pd-tabgroup-lbl">'+esc(grp.g)+'</div><div class="pd-tabs">'
      +grp.tabs.map(function(t){return '<button class="pd-tab'+(_pdTab===t[0]?' active':'')+'" onclick="pdSetTab(\''+id+'\',\''+t[0]+'\')">'+t[1]+'</button>';}).join('')
      +'</div></div>';
  }).join('')+'</div>';
  var hdr='<div class="mdl-over">Proposal</div>'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:6px">'
    +'<div style="flex:1;min-width:280px"><div class="mdl-title" style="margin-bottom:4px">'+esc(p.title)+'</div>'
    +(opp?'<div style="font-size:12px;color:var(--text-muted)">Linked to <b>'+esc(opp.name)+'</b>'+(opp.customer?' · '+esc(opp.customer):'')+'</div>':'<div style="font-size:12px;color:var(--text-muted)">Not linked to an opportunity</div>')
    +(tpl?'<div style="font-size:11px;color:var(--text-muted);margin-top:2px">Template: '+esc(tpl.name)+'</div>':'')+'</div>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center"><select class="fld-sel" style="font-size:11px;padding:5px 8px;width:auto;background:'+s.c+'14;color:'+s.c+';border-color:'+s.c+'66;font-weight:700" onchange="pdSetStatus(\''+id+'\',this.value)">'+stsOpts+'</select>'+dueChip+'</div></div>';
  var body=hdr+tabBar;
  if(_pdTab==='overview')body+=_pdOverviewHTML(p,opp,tpl);
  else if(_pdTab==='rfp')body+=_pdRFPHTML(p);
  else if(_pdTab==='brief')body+=_pdBriefHTML(p);
  else if(_pdTab==='sections')body+=_pdSectionsHTML(p,tpl);
  else if(_pdTab==='staffing')body+=_pdStaffingHTML(p);
  else if(_pdTab==='pp')body+=_pdPastPerfHTML(p);
  else if(_pdTab==='pricing')body+=_pdPricingHTML(p);
  else if(_pdTab==='cover')body+=_pdCoverSheetHTML(p);
  else if(_pdTab==='redteam')body+=_pdRedTeamHTML(p);
  else if(_pdTab==='export')body+=_pdExportHTML(p);
  else if(_pdTab==='files')body+=_pdFilesHTML(p);
  else if(_pdTab==='settings')body+=_pdSettingsHTML(p);
  body+='<div class="btn-row" style="margin-top:14px">'
    +'<button class="btn btn-danger-sm" onclick="pdDelete(\''+id+'\')">Delete Proposal</button>'
    +'<button class="btn btn-sec" style="flex:1" onclick="closeModal(\'ovProp\')">Close</button>'
    +'</div>';
  document.getElementById('mdlProp').innerHTML=body;
}
function pdSetStatus(id,k){
  var p=(D.proposals||[]).find(function(x){return x.id===id;});if(!p)return;
  if(p.status===k)return;
  var from=p.status;
  p.events=p.events||[];p.events.push({ts:Date.now(),actorId:ME?ME.id:'',actorName:ME?ME.name:'—',type:'status.changed',payload:{from:from,to:k}});
  p.status=k;save();renderProposalDetail(id);renderView();
  // Win/Loss workflow trigger
  if(k==='won'||k==='lost')openWinLossModal(id,k);
}
function pdDelete(id){
  if(!confirm('Delete this proposal? Linked opportunity (if any) is not removed.'))return;
  D.proposals=(D.proposals||[]).filter(function(x){return x.id!==id;});
  save();closeModal('ovProp');renderView();
}

function pdSaveRFP(id){
  var p=(D.proposals||[]).find(function(x){return x.id===id;});if(!p)return;
  p.rfp=p.rfp||{};
  ['customer','dueDate','pop','contractVehicle','setAsideType','summary','scope'].forEach(function(f){p.rfp[f]=gv('pd_rfp_'+f);});
  p.rfp.potentialValue=Number(gv('pd_rfp_potentialValue'))||0;
  ['requirements','requiredCerts','requiredClearances','deliverables','evaluationCriteria'].forEach(function(f){
    p.rfp[f]=gv('pd_rfp_'+f).split('\n').map(function(s){return s.trim();}).filter(Boolean);
  });
  p.events=p.events||[];p.events.push({ts:Date.now(),actorId:ME?ME.id:'',actorName:ME?ME.name:'—',type:'rfp.edited',payload:{}});
  save();renderProposalDetail(id);renderView();
  alert('RFP details saved.');
}

function _pdPastPerfHTML(p){
  var matches=(p.pastPerformance&&p.pastPerformance.matches)||[];
  var caseStudies=(D.companyProfile&&D.companyProfile.caseStudies)||[];
  var gen=p.pastPerformance&&p.pastPerformance.generatedAt;
  var btnLabel=gen?'↻ Re-run match':'✨ Find Past Performance Matches';
  var btn=caseStudies.length?'<button type="button" class="ai-btn" onclick="pdRunPastPerf(\''+p.id+'\')">'+btnLabel+'</button>':'<div style="font-size:12px;color:var(--text-muted)">Add case studies to your <b>Company Profile</b> first — Claude needs them to match against.</div>';
  var matchesHTML=matches.length?matches.slice().sort(function(a,b){return (b.relevanceScore||0)-(a.relevanceScore||0);}).map(function(m){
    var cs=caseStudies.find(function(c){return c.id===m.caseStudyId;});
    if(!cs)return '';
    var s=m.relevanceScore||0;
    var cls=s>=75?'pp-score-high':s>=50?'pp-score-med':'pp-score-low';
    var checked=(p.coverSheet&&p.coverSheet.includedCaseStudyIds||[]).indexOf(cs.id)>-1;
    return '<div class="pp-card"><div class="pp-card-hdr"><div style="flex:1"><div style="font-size:13px;font-weight:700">'+esc(cs.title||cs.customer||'?')+'</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">'+esc(cs.customer||'')+(cs.value?' · '+fmt(cs.value):'')+(cs.period?' · '+esc(cs.period):'')+'</div></div><span class="pp-score '+cls+'">'+s+'%</span></div>'
      +'<div class="pp-card-rationale"><b>Why it matches:</b> '+esc(m.rationale||'(no rationale)')+'</div>'
      +(cs.outcomes&&cs.outcomes.length?'<div style="font-size:11px;color:var(--text-secondary);margin-top:4px"><b>Outcomes:</b> '+esc(cs.outcomes.slice(0,3).join(' · '))+'</div>':'')
      +'<div style="margin-top:6px;font-size:11px"><label style="display:inline-flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" '+(checked?'checked':'')+' onchange="pdTogglePPInclude(\''+p.id+'\',\''+cs.id+'\',this.checked)"> Include in proposal</label></div>'
      +'</div>';
  }).join(''):(gen?'<div style="font-size:12px;color:var(--text-muted)">No matches found. Try adding more case studies to the Company Profile.</div>':'<div style="font-size:12px;color:var(--text-muted);padding:14px 0">No past performance run yet. Click the button above.</div>');
  return '<div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">Claude semantically matches the RFP scope against your Company Profile case studies and ranks them. Pick the ones you want cited in the proposal.</div>'
    +'<div style="margin-bottom:10px">'+btn+(gen?' <span style="font-size:11px;color:var(--text-muted);margin-left:8px">last run '+new Date(gen).toLocaleString()+'</span>':'')+'</div>'
    +matchesHTML;
}
function _propLLMOpts(p){
  // Returns {provider, model} resolving proposal override → user default → app default
  var myAcc=ME?(D.accounts||[]).find(function(a){return a.id===ME.id;}):null;
  return {
    provider:p.llmProvider||(myAcc&&myAcc.defaultLlmProvider)||'anthropic',
    model:p.llmModel||(myAcc&&myAcc.defaultLlmModel)||''
  };
}
function pdRunPastPerf(id){
  var p=(D.proposals||[]).find(function(x){return x.id===id;});if(!p)return;
  var caseStudies=(D.companyProfile&&D.companyProfile.caseStudies)||[];
  if(!caseStudies.length){alert('Add case studies to Company Profile first.');return;}
  var rfp=p.rfp||{};
  var rfpCtx=[rfp.summary||'',rfp.scope||'',(rfp.requirements||[]).join('; '),'Customer: '+(rfp.customer||''),'Vehicle: '+(rfp.contractVehicle||'')].filter(Boolean).join('\n\n').slice(0,3500);
  var library=caseStudies.map(function(c){return {id:c.id,title:c.title||c.customer||'?',customer:c.customer||'',scope:(c.scope||'').slice(0,400),outcomes:(c.outcomes||[]).slice(0,4),tech:(c.tech||[]).slice(0,8),period:c.period||'',value:c.value||0};});
  var sys='You are a federal capture analyst scoring past performance relevance against an RFP. Output ONLY a JSON object inside a ```json``` block.';
  var prompt='Score each case study below for relevance to this RFP (0-100, higher = better fit). Provide a 1-sentence rationale for each. Return at most '+Math.min(10,library.length)+' results sorted highest-first.\n\nRFP CONTEXT:\n'+rfpCtx+'\n\nCASE STUDY LIBRARY:\n'+JSON.stringify(library)+'\n\nReturn:\n{"matches":[{"caseStudyId":"...","relevanceScore":number,"rationale":"why this is relevant to the RFP"}]}';
  var llm=_propLLMOpts(p);
  var btn=event&&event.target;if(btn){btn.disabled=true;btn.textContent='✨ Scoring…';}
  llmComplete({provider:llm.provider,model:llm.model,system:sys,messages:[{role:'user',content:prompt}],max_tokens:2500})
    .then(function(j){
      var parsed=llmExtractJSON(j);
      if(!parsed||!parsed.matches)throw new Error('Could not parse past-performance response.');
      p.pastPerformance={matches:parsed.matches.filter(function(m){return library.find(function(c){return c.id===m.caseStudyId;});}),generatedAt:Date.now()};
      p.events=p.events||[];p.events.push({ts:Date.now(),actorId:ME?ME.id:'',actorName:ME?ME.name:'—',type:'pp.matched',payload:{count:p.pastPerformance.matches.length}});
      save();renderProposalDetail(id);renderView();
    })
    .catch(function(e){alert('Past performance matching failed: '+(e&&e.message||e));})
    .finally(function(){if(btn){btn.disabled=false;btn.textContent='↻ Re-run match';}});
}
function pdTogglePPInclude(id,csId,on){
  var p=(D.proposals||[]).find(function(x){return x.id===id;});if(!p)return;
  p.coverSheet=p.coverSheet||{};p.coverSheet.includedCaseStudyIds=p.coverSheet.includedCaseStudyIds||[];
  var i=p.coverSheet.includedCaseStudyIds.indexOf(csId);
  if(on&&i<0)p.coverSheet.includedCaseStudyIds.push(csId);
  else if(!on&&i>-1)p.coverSheet.includedCaseStudyIds.splice(i,1);
  save();
}

function _propBuildBriefCtx(p){
  var b=p.brief||{};var parts=[];
  if(b.text){var t=b.text.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();if(t)parts.push('What we propose (raw capture notes):\n'+t);}
  if(b.winThemes&&b.winThemes.trim())parts.push('Win themes:\n- '+b.winThemes.trim().split(/\n+/).join('\n- '));
  if(b.differentiators&&b.differentiators.trim())parts.push('Differentiators:\n- '+b.differentiators.trim().split(/\n+/).join('\n- '));
  return parts.join('\n\n');
}
// Company + service differentiators and win themes, for injection into prompts.
function _propBuildDifferentiatorsCtx(p){
  var cp=D.companyProfile||{};var parts=[];
  if((cp.differentiators||[]).length)parts.push('Company differentiators:\n- '+cp.differentiators.join('\n- '));
  var svc=(cp.services||[]).filter(function(s){return (s.differentiators||[]).length;});
  if(svc.length)parts.push('Service differentiators:\n'+svc.map(function(s){return '- '+s.name+': '+s.differentiators.join('; ');}).join('\n'));
  var wt=(cp.winThemes||[]).map(function(w){return typeof w==='string'?w:(w.theme||'');}).filter(Boolean);
  if(wt.length)parts.push('Win themes:\n- '+wt.join('\n- '));
  return parts.join('\n\n');
}

function _propSectionPrompt(p,s,kbBlock){

  var t=(s.title||'').toLowerCase();
  var briefCtx=_propBuildBriefCtx(p);
  var instruction='SECTION TO DRAFT: "'+s.title+'"\n\nPER-SECTION INSTRUCTION (from the proposal template — primary guidance):\n'+(s.templatePrompt||'(no template instruction; write a strong default '+s.title+' section)')
    +'\n\nRFP CONTEXT:\n'+_propBuildRFPCtx(p)
    +(briefCtx?'\n\nBUSDEV BRIEF (the capture team\'s intent — expand, enhance, and professionalize this into full prose; honor every point):\n'+briefCtx:'')
    +(kbBlock?'\n\nKNOWLEDGE BANK (excerpts from CommunityForce past proposals & capability docs — reuse relevant facts, proof points, and phrasing, but adapt to THIS customer; do not present another customer\'s work as this one\'s):\n'+kbBlock:'')
    +'\n\nBRAND VOICE:\n'+_propBuildVoiceCtx()
    +(_propBuildDifferentiatorsCtx(p)?'\n\nDIFFERENTIATORS & WIN THEMES (weave the relevant ones in naturally; do not list them mechanically):\n'+_propBuildDifferentiatorsCtx(p):'')
    +((t.indexOf('past')>-1||t.indexOf('experience')>-1)?'\n\nPAST PERFORMANCE LIBRARY (use ONLY these — do not invent):\n'+(_propBuildPPCtx(p)||'(none selected; flag this in your output)'):'')
    +((t.indexOf('cert')>-1||t.indexOf('capabilit')>-1)?'\n\nACTIVE CERTIFICATIONS:\n'+(_propBuildCertCtx(p)||'(none selected)'):'')
    +(s.evidence&&s.evidence.length?'\n\nREQUIRED EVIDENCE: '+s.evidence.join(', ')+'.':'')
    +(s.pageBudget?'\n\nTARGET LENGTH: roughly '+s.pageBudget+' page'+(s.pageBudget===1?'':'s')+' of professional prose.':'')
    +(s.html&&s.html.trim()?'\n\nEXISTING DRAFT (rewrite/improve this rather than starting fresh):\n'+s.html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').slice(0,2000):'');
  return {sys:sys,instruction:instruction};

// Full-proposal generator: capture brief → select relevant Knowledge Bank docs
// once → draft every AI/hybrid section sequentially with live progress.
function pdGenerateFullProposal(id){
  var p=(D.proposals||[]).find(function(x){return x.id===id;});if(!p)return;
  pdCaptureBrief(p);
  if(!p.sections||!p.sections.length){
    if(p.templateId)_propInitSections(p);
    if(!p.sections||!p.sections.length){alert('Link a template in the Settings tab so Atlas knows which sections to generate.');return;}
  }
  var aiSecs=p.sections.filter(function(s){return s.source==='ai'||s.source==='hybrid';});
  if(!aiSecs.length){alert('This template has no AI-fillable sections (mark sections as "ai" or "hybrid" in the template).');return;}
  var already=aiSecs.filter(function(s){return (s.html||'').trim();}).length;
  if(!confirm('Generate '+aiSecs.length+' section'+(aiSecs.length===1?'':'s')+' with AI from the BusDev brief, the RFP, and the Knowledge Bank?'+(already?'\n\n'+already+' section'+(already===1?'':'s')+' already have content — existing text will be used as a starting point and rewritten.':'')))return;
  var llm=_propLLMOpts(p);
  var btn=document.getElementById('pd_gen_btn');if(btn){btn.disabled=true;btn.textContent='Generating…';}
  function setStatus(msg){var el=document.getElementById('pd_gen_status');if(el)el.innerHTML=msg;}
  setStatus('Selecting relevant Knowledge Bank sources…');
  var rfp=p.rfp||{};
  var kbCtxStr=[rfp.customer,rfp.summary,rfp.scope,(rfp.requirements||[]).join('; '),_propBuildBriefCtx(p)].filter(Boolean).join('\n').slice(0,6000);
  kbBuildContext(kbCtxStr,4,3500,function(kbBlock,kbIds){
    kbIds=kbIds||[];
    var i=0,errs=0;
    function done(){
      var doPricing=_genFlag('pd_gen_pricing',true);
      var doDoss=_genFlag('pd_gen_dossiers',false);
      var pricingMsg=doPricing&&_genSeedPricing(p)?' · pricing seeded':'';
      function finalize(dossCount){
        if(btn){btn.disabled=false;btn.textContent='✨ Generate Full Proposal';}
        p.events=p.events||[];p.events.push({ts:Date.now(),actorId:ME?ME.id:'',actorName:ME?ME.name:'—',type:'proposal.generated',payload:{sections:aiSecs.length,errors:errs,kbSources:kbIds.length,pricingSeeded:!!pricingMsg,dossiers:dossCount}});
        save();
        setStatus('Done — drafted '+(aiSecs.length-errs)+'/'+aiSecs.length+' section'+(aiSecs.length===1?'':'s')+(errs?' ('+errs+' failed — retry individually)':'')+pricingMsg+(dossCount?' · '+dossCount+' dossier'+(dossCount===1?'':'s'):'')+'. Opening Sections…');
        setTimeout(function(){_pdTab='sections';renderProposalDetail(id);},1100);
      }
      if(doDoss){setStatus('Generating key-personnel dossiers for assigned bench…');_genDossiers(p,finalize);}
      else finalize(0);
    }
    function next(){

// CF resource×months pricing roll-up (base year + option years + escalation),
// plus ODCs and travel. Monthly burn = sum(FTE × monthly rate).
function _cfPricingTotals(p){
  var cf=(p.pricing&&p.pricing.cf)||{};
  var rate0=Number(cf.monthlyRate)||0;
  var baseMonths=Number(cf.baseMonths)||12;
  var optYears=Math.max(0,Math.min(10,Number(cf.optionYears)||0));
  var esc=(Number(cf.escalationPct)||0)/100;
  var rows=(cf.resources||[]).map(function(r){
    var rate=(r.monthlyRate===''||r.monthlyRate==null)?rate0:(Number(r.monthlyRate)||0);
    var count=Number(r.count)||0;
    var base=count*baseMonths*rate;
    var yrTotals=[base];
    for(var y=1;y<=optYears;y++)yrTotals.push(Math.round(base*Math.pow(1+esc,y)));
    var total=yrTotals.reduce(function(s,v){return s+v;},0);
    return {r:r,rate:rate,count:count,base:base,yrTotals:yrTotals,total:total};
  });
  var laborBase=rows.reduce(function(s,r){return s+r.base;},0);
  var laborAll=rows.reduce(function(s,r){return s+r.total;},0);
  var monthlyBurn=rows.reduce(function(s,r){return s+r.count*r.rate;},0);
  var odcTotal=(cf.odcs||[]).reduce(function(s,o){return s+(Number(o.qty)||0)*(Number(o.unitCost)||0);},0);
  var travel=Number(cf.travel)||0;
  return {rate0:rate0,baseMonths:baseMonths,optYears:optYears,esc:esc,rows:rows,laborBase:laborBase,laborAll:laborAll,monthlyBurn:monthlyBurn,odcTotal:odcTotal,travel:travel,grand:laborAll+odcTotal+travel};
}

}

function pdPricingSetMode(propId,mode){
  var p=(D.proposals||[]).find(function(x){return x.id===propId;});if(!p)return;
  p.pricing=p.pricing||{};p.pricing.mode=mode;
  save();renderProposalDetail(propId);
}
function pdPricingSetLink(propId,projId){
  var p=(D.proposals||[]).find(function(x){return x.id===propId;});if(!p)return;
  p.pricing=p.pricing||{};p.pricing.linkedProjectId=projId;
  save();renderProposalDetail(propId);
}
function pdPricingPullCLINs(propId){
  var p=(D.proposals||[]).find(function(x){return x.id===propId;});if(!p||!p.pricing||!p.pricing.linkedProjectId)return;
  var proj=D.projects.find(function(x){return x.id===p.pricing.linkedProjectId;});
  if(!proj||!Array.isArray(proj.clins)||!proj.clins.length){alert('Linked project has no CLINs.');return;}
  p.pricing.items=p.pricing.items||[];
  var existingClinIds={};p.pricing.items.forEach(function(i){if(i.clinId)existingClinIds[i.clinId]=true;});
  var added=0;
  proj.clins.forEach(function(c){
    if(existingClinIds[c.id])return;
    // Use the project's CLIN cost-to-bill model: monthly revenue × 12 as an order-of-magnitude starter for fee.
    var monthlyRev=Number(c.revenue)||0;
    p.pricing.items.push({
      id:uid(),clinId:c.id,
      phase:c.number||'',lcat:c.title||'',description:c.notes||'',
      hours:0,rate:0,fee:monthlyRev*12,
      source:'clin',locked:false
    });
    added++;
  });
  if(!added){alert('All CLINs from this project are already on the proposal.');return;}
  p.events=p.events||[];p.events.push({ts:Date.now(),actorId:ME?ME.id:'',actorName:ME?ME.name:'—',type:'pricing.clins-pulled',payload:{added:added,projectId:proj.id}});
  save();renderProposalDetail(propId);
}
function pdPricingItemAdd(propId){
  var p=(D.proposals||[]).find(function(x){return x.id===propId;});if(!p)return;
  p.pricing=p.pricing||{items:[]};p.pricing.items=p.pricing.items||[];
  p.pricing.items.push({id:uid(),phase:'',lcat:'',description:'',hours:0,rate:0,fee:0,source:'manual'});
  save();renderProposalDetail(propId);
}
function pdPricingItemSet(propId,idx,field,val){
  var p=(D.proposals||[]).find(function(x){return x.id===propId;});if(!p||!p.pricing||!p.pricing.items)return;
  var it=p.pricing.items[idx];if(!it)return;
  if(field==='hours'||field==='rate'||field==='fee'){
    it[field]=Number(val)||0;
    if(field==='hours'||field==='rate'){
      var h=Number(it.hours)||0,r=Number(it.rate)||0;
      if(h&&r)it.fee=Math.round(h*r);
    }
  } else { it[field]=val; }
  save();
  // Update totals row in place without full re-render
  var totalEl=document.querySelector('.price-totals .v');
  if(totalEl)totalEl.textContent=fmt(_propPricingTotal(p));
}
function pdPricingItemDel(propId,idx){
  var p=(D.proposals||[]).find(function(x){return x.id===propId;});if(!p||!p.pricing||!p.pricing.items)return;
  if(!confirm('Delete this line item?'))return;
  p.pricing.items.splice(idx,1);
  save();renderProposalDetail(propId);
}

function pdPricingDraftAssumptions(propId){
  var p=(D.proposals||[]).find(function(x){return x.id===propId;});if(!p)return;
  var pr=p.pricing||{};
  var itemsSummary;
  if(pr.mode==='cf-monthly'){
    var t=_cfPricingTotals(p);
    if(!t.rows.length){alert('Add at least one resource first.');return;}
    itemsSummary=t.rows.map(function(r){return '- '+(r.r.role||'role')+': '+r.count+' FTE × '+t.baseMonths+' mo × $'+r.rate+'/mo = $'+r.base+' (base yr)';}).join('\n')
      +'\nPricing model: firm-fixed-price, fixed monthly rate per resource. Base year '+t.baseMonths+' months + '+t.optYears+' option year(s)'+(t.esc?' with '+(t.esc*100)+'% annual escalation':' (flat, no escalation)')+'. Monthly burn $'+t.monthlyBurn+'/mo. ODCs $'+t.odcTotal+', travel $'+t.travel+'.';
  } else {
    if(!(pr.items||[]).length){alert('Add at least one pricing line item first.');return;}
    itemsSummary=(pr.items||[]).map(function(i){return '- '+(i.phase?i.phase+' / ':'')+(i.lcat||i.description||'item')+(i.hours?' · '+i.hours+'h':'')+(i.rate?' @ $'+i.rate:'')+' = $'+(i.fee||0);}).join('\n');
  }
  var total=_propPricingTotal(p);
  var sys='You draft the Pricing Assumptions / Basis-of-Estimate / Exceptions narrative for a federal proposal. Output ONLY clean HTML (use <p>, <ul>/<li>, <strong>; no markdown, no code fences, no commentary outside HTML). Keep dollar figures and quantities exactly as given; do NOT invent rates or hours.';
  var instruction='Draft the assumptions, basis-of-estimate, and exceptions narrative for the following proposal pricing.\n\n'
    +'RFP CONTEXT:\n'+_propBuildRFPCtx(p)
    +'\n\nBRAND VOICE:\n'+_propBuildVoiceCtx()
    +'\n\nPRICING LINE ITEMS (total: $'+total.toLocaleString()+', currency '+(pr.currency||'USD')+'):\n'+itemsSummary
    +(pr.paymentTerms?'\n\nPAYMENT TERMS: '+pr.paymentTerms:'')
    +(pr.mode==='project-clins'?'\n\nThis pricing is structured around the linked project\'s CLIN model.':'')
    +'\n\nProduce 3 sections in HTML:\n<h3>Basis of Estimate</h3> — how rates/hours were derived (labor categories, productivity assumptions, supporting infrastructure)\n<h3>Assumptions</h3> — bulleted list of what we assumed (PoP, kickoff, facilities/access, government-furnished items, key personnel availability, escalation, travel)\n<h3>Exceptions</h3> — bulleted list of things expressly NOT included (or "None" if nothing material). Keep it sober and defensible; no marketing fluff.';
  var llm=_propLLMOpts(p);
  var btn=event&&event.target;if(btn){btn.disabled=true;btn.textContent='✨ Drafting…';}
  llmComplete({provider:llm.provider,model:llm.model,system:sys,messages:[{role:'user',content:instruction}],max_tokens:2500})
    .then(function(j){
      var html=llmExtractText(j).trim().replace(/^```html\s*/i,'').replace(/```$/,'').trim();
      openAIPreview({
        title:'AI Draft · Pricing Assumptions',
        html:html,
        onApply:function(final){
          p.pricing.assumptionsHtml=final;
          p.events=p.events||[];p.events.push({ts:Date.now(),actorId:ME?ME.id:'',actorName:ME?ME.name:'—',type:'pricing.assumptions-drafted',payload:{provider:llm.provider}});
          save();renderProposalDetail(propId);
        },
        onAppend:(pr.assumptionsHtml||'').trim()?function(final){p.pricing.assumptionsHtml=(p.pricing.assumptionsHtml||'')+'<p>'+final+'</p>';save();renderProposalDetail(propId);}:null
      });
    })
    .catch(function(e){alert('Assumptions draft failed: '+(e&&e.message||e));})
    .finally(function(){if(btn){btn.disabled=false;btn.textContent='✨ Draft Assumptions';}});
}

function pdScoreBench(propId){
  var p=(D.proposals||[]).find(function(x){return x.id===propId;});if(!p)return;
  var roles=(p.rfp&&p.rfp.requiredRoles)||[];
  if(!roles.length){alert('No required roles to score against.');return;}
  // Build compact member roster (cap at 60 to stay within token budget)
  var members=allM().slice(0,60).map(function(m){
    return {
      id:m.id,name:m.name,role:m.role||'',
      skills:_resolveSkillsetNames(m.skillsets),
      certs:_resolveCertNames(m.certifications),
      location:_resolveLocName(m.location)||m.location||'',
      clearance:_resolveClrName(m.clearance)||m.clearance||'',
      tags:[m.sme?'SME':'',m.hub?'Hub':'',m.associate?'Associate':'',m.proposal?'Proposal':'',m.recruiter?'Recruiter':''].filter(Boolean)
    };
  });
  if(!members.length){alert('No people in the org chart to score against.');return;}
  var sys='You are a federal-services capture analyst matching a company\'s internal bench to required RFP roles. Output ONLY a JSON object inside a ```json``` block. Score 0-100 per member per role (0 = no fit; 100 = exact match on skills + cert + clearance + location). Be strict — partial overlap is not high fit. Give a 1-sentence rationale citing specific skills/certs/clearance.';
  var prompt='REQUIRED ROLES (in order; use roleIndex 0,1,...):\n'+roles.map(function(r,i){return i+'. '+r.title+' × '+(r.count||1)+' — skills: '+((r.skills||[]).join(', ')||'(any)')+' · clearance: '+(r.clearance||'none')+' · location: '+(r.location||'any');}).join('\n')
    +'\n\nINTERNAL BENCH:\n'+JSON.stringify(members)
    +'\n\nFor EACH role, return the top 5 members ranked by fit. Return ONLY this JSON:\n'
    +'{"matches":[{"roleIndex":number,"candidates":[{"memberId":"...","fitScore":number,"rationale":"why"}]}]}';
  var llm=_propLLMOpts(p);
  var btn=event&&event.target;if(btn){btn.disabled=true;btn.textContent='✨ Scoring…';}
  llmComplete({provider:llm.provider,model:llm.model,system:sys,messages:[{role:'user',content:prompt}],max_tokens:6000})
    .then(function(j){
      var parsed=llmExtractJSON(j);
      if(!parsed||!parsed.matches)throw new Error('Could not parse bench-score response.');
      p.staffing=p.staffing||{roleMatches:[]};
      // Initialize roleMatches to length of roles
      while(p.staffing.roleMatches.length<roles.length)p.staffing.roleMatches.push({intent:'',candidates:[],requisitionId:'',assignedMemberIds:[]});
      // Apply candidate scores per role, preserving intent/requisitionId/assigned
      parsed.matches.forEach(function(m){
        var idx=m.roleIndex;if(typeof idx!=='number'||idx<0||idx>=roles.length)return;
        if(!p.staffing.roleMatches[idx])p.staffing.roleMatches[idx]={intent:'',candidates:[],requisitionId:'',assignedMemberIds:[]};
        p.staffing.roleMatches[idx].candidates=(m.candidates||[]).filter(function(c){return allM().find(function(mm){return mm.id===c.memberId;});});
      });
      p.staffing.generatedAt=Date.now();
      p.events=p.events||[];p.events.push({ts:Date.now(),actorId:ME?ME.id:'',actorName:ME?ME.name:'—',type:'staffing.scored',payload:{roles:roles.length}});
      save();renderProposalDetail(propId);
    })
    .catch(function(e){alert('Bench scoring failed: '+(e&&e.message||e));})
    .finally(function(){if(btn){btn.disabled=false;btn.textContent='↻ Re-score bench';}});
}
function pdStaffingSetIntent(propId,idx,intent){
  var p=(D.proposals||[]).find(function(x){return x.id===propId;});if(!p)return;
  p.staffing=p.staffing||{roleMatches:[]};
  while(p.staffing.roleMatches.length<=idx)p.staffing.roleMatches.push({intent:'',candidates:[],requisitionId:'',assignedMemberIds:[]});
  p.staffing.roleMatches[idx].intent=p.staffing.roleMatches[idx].intent===intent?'':intent;
  save();renderProposalDetail(propId);
}

  llmComplete({provider:llm.provider,model:llm.model,system:sys,messages:[{role:'user',content:instruction}],max_tokens:2500})
    .then(function(j){
      var html=llmExtractText(j).trim().replace(/^```html\s*/i,'').replace(/```$/,'').trim();
      openAIPreview({

function _pdRedTeamHTML(p){
  var rt=p.redTeam||{rubric:[],reviews:[],createdTaskId:'',generatedAt:0};
  var hasSections=(p.sections||[]).filter(function(s){return (s.html||'').trim();}).length>0;

      +'<div style="font-size:11px;margin-bottom:12px">Claude will generate a section-by-section scoring rubric (Compliance · Win Themes · Clarity · Risk) tailored to this RFP. Reviewers then score each section 1-5. A Project Task on the linked opportunity ties the review to the broader workflow.</div>'
      +(hasSections?'<button class="ai-btn" onclick="pdGenerateRedTeamRubric(\''+p.id+'\')">✨ Generate Red-Team Rubric</button>':'<div style="font-size:11px;color:var(--warn-text)">Draft at least one section first.</div>')
      +'</div>';
  }
  // Render rubric + reviews
  var members=allM();
  var myReview=rt.reviews.find(function(r){return r.reviewerId===(ME?ME.id:'');})||{reviewerId:ME?ME.id:'',reviewerName:ME?ME.name:'',scores:{}};
  var taskInfo='';
  if(rt.createdTaskId){
    var task=(D.activities||[]).find(function(a){return a.id===rt.createdTaskId;});
    if(task)taskInfo='<div style="font-size:11px;color:var(--text-muted);margin-left:8px">Linked task: <a href="#" onclick="event.preventDefault();closeModal(\'ovProp\');switchTab(\'ptask\');setTimeout(function(){openPlanModal(\''+task.id+'\');},150)">'+esc(task.subtask||'red-team task')+'</a></div>';
  }
  var sectionsHTML=rt.rubric.map(function(sr){
    var sec=(p.sections||[]).find(function(s){return s.id===sr.sectionId;});
    var secTitle=sec?sec.title:sr.sectionTitle||'?';
    var criteriaHTML=(sr.criteria||[]).map(function(c){
      var key=sr.sectionId+'|'+c.name;
      var myScore=myReview.scores[key]||0;
      // All reviews collected
      var allScores=rt.reviews.map(function(r){return Number(r.scores[key])||0;}).filter(function(n){return n>0;});
      var avg=allScores.length?(allScores.reduce(function(s,n){return s+n;},0)/allScores.length).toFixed(1):'—';
      var avgCls=avg==='—'?'':(avg>=4?'rt-score-avg-good':avg>=2.5?'rt-score-avg-mid':'rt-score-avg-bad');
      var scoreBtns=[1,2,3,4,5].map(function(n){return '<button type="button" class="rt-score-btn'+(myScore===n?' active':'')+'" onclick="pdRedTeamScore(\''+p.id+'\',\''+sr.sectionId+'\',\''+esc(c.name)+'\','+n+')">'+n+'</button>';}).join('');
      return '<div class="rt-criterion">'
        +'<div class="rt-criterion-hdr"><span class="rt-criterion-name">'+esc(c.name)+'</span><span class="rt-score-summary '+avgCls+'">'+(avg!=='—'?'avg '+avg+' ('+allScores.length+')':'no reviews')+'</span></div>'
        +'<div class="rt-criterion-anchors"><b>1:</b> '+esc(c.one||'')+' &middot; <b>3:</b> '+esc(c.three||'')+' &middot; <b>5:</b> '+esc(c.five||'')+'</div>'
        +'<div class="rt-score-row"><span style="font-size:10px;color:var(--text-muted);margin-right:4px">Your score:</span>'+scoreBtns+'</div>'
        +'</div>';
    }).join('');
    return '<div class="rt-card">'
      +'<div class="rt-card-hdr"><div><div class="rt-card-ttl">'+esc(secTitle)+'</div></div></div>'
      +criteriaHTML
      +'</div>';
  }).join('');
  var totReviews=rt.reviews.length;
  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">'
    +'<div style="font-size:12px;color:var(--text-muted)">Section-by-section rubric. Each reviewer scores 1-5 across Compliance, Win Themes, Clarity, Risk. Averages show across all reviewers.</div>'
    +'<div>'+(rt.createdTaskId?'':'<button class="btn btn-gold btn-sm" onclick="pdAssignRedTeam(\''+p.id+'\')">+ Assign Reviewers (create Project Task)</button>')
    +'<button class="ai-btn" style="margin-left:6px" onclick="pdGenerateRedTeamRubric(\''+p.id+'\')">↻ Regenerate Rubric</button></div>'
    +'</div>'
    +'<div style="font-size:11px;color:var(--text-muted);margin-bottom:10px">'+totReviews+' reviewer'+(totReviews===1?'':'s')+' have submitted · last rubric generated '+(rt.generatedAt?new Date(rt.generatedAt).toLocaleString():'unknown')+taskInfo+'</div>'
    +sectionsHTML;
}
function pdGenerateRedTeamRubric(propId){
  var p=(D.proposals||[]).find(function(x){return x.id===propId;});if(!p)return;
  var drafted=(p.sections||[]).filter(function(s){return (s.html||'').trim()&&s.source!=='computed';});
  if(!drafted.length){alert('Draft at least one section first.');return;}
  var sys='You are a senior federal-proposal red-team lead. For each section, design a scoring rubric with FOUR criteria: Compliance, Win Themes, Clarity, Risk. Each criterion gets 1/3/5 anchor descriptions. Output ONLY JSON in a ```json``` block.';
  var rfpCtx=_propBuildRFPCtx(p);
  var sectionList=drafted.map(function(s){return {id:s.id,title:s.title,wordCount:(s.html||'').replace(/<[^>]+>/g,' ').split(/\s+/).filter(Boolean).length};});
  var prompt='RFP CONTEXT:\n'+rfpCtx.slice(0,3000)+'\n\nPROPOSAL SECTIONS:\n'+JSON.stringify(sectionList)
    +'\n\nReturn:\n{"rubric":[{"sectionId":"...","sectionTitle":"...","criteria":[{"name":"Compliance","one":"what 1 looks like","three":"what 3 looks like","five":"what 5 looks like"},{...3 more criteria}]}]}';
  var llm=_propLLMOpts(p);
  var btn=event&&event.target;if(btn){btn.disabled=true;btn.textContent='✨ Generating…';}
  llmComplete({provider:llm.provider,model:llm.model,system:sys,messages:[{role:'user',content:prompt}],max_tokens:5000})
    .then(function(j){
      var parsed=llmExtractJSON(j);if(!parsed||!parsed.rubric)throw new Error('Could not parse rubric response.');
      p.redTeam=p.redTeam||{rubric:[],reviews:[],createdTaskId:'',generatedAt:0};
      p.redTeam.rubric=parsed.rubric.filter(function(r){return drafted.find(function(s){return s.id===r.sectionId;});});
      p.redTeam.generatedAt=Date.now();
      p.events=p.events||[];p.events.push({ts:Date.now(),actorId:ME?ME.id:'',actorName:ME?ME.name:'—',type:'redteam.rubric-generated',payload:{sections:p.redTeam.rubric.length}});
      save();renderProposalDetail(propId);
    })
    .catch(function(e){alert('Rubric generation failed: '+(e&&e.message||e));})
    .finally(function(){if(btn){btn.disabled=false;btn.textContent='✨ Generate Red-Team Rubric';}});
}
function pdRedTeamScore(propId,sectionId,criterion,score){
  var p=(D.proposals||[]).find(function(x){return x.id===propId;});if(!p)return;
  p.redTeam=p.redTeam||{reviews:[]};p.redTeam.reviews=p.redTeam.reviews||[];
  var myReview=p.redTeam.reviews.find(function(r){return r.reviewerId===(ME?ME.id:'');});
  if(!myReview){myReview={reviewerId:ME?ME.id:'',reviewerName:ME?ME.name:'',scores:{},submittedAt:Date.now()};p.redTeam.reviews.push(myReview);}
  var key=sectionId+'|'+criterion;
  myReview.scores[key]=score;
  myReview.submittedAt=Date.now();
  save();renderProposalDetail(propId);
}
function pdAssignRedTeam(propId){
  var p=(D.proposals||[]).find(function(x){return x.id===propId;});if(!p)return;
  if(!p.opportunityId){toast('Link this proposal to an opportunity first — the red-team task attaches to it.','warn',4500);return;}
  openFormModal({over:'Red Team',title:'Assign Reviewers',submitLabel:'Create Review Task',
    intro:'Creates a Project Task on the linked opportunity. Reviewer names matching the org chart are auto-linked and notified.',
    fields:[
      {key:'who',label:'Reviewer names (comma-separated)',type:'text',required:true,placeholder:'e.g. Jane Doe, John Smith'},
      {key:'dueDate',label:'Due date',type:'date'}
    ],
    onSubmit:function(v){
      var who=v.who.trim();var dueDate=v.dueDate||'';
      var opp=D.projects.find(function(x){return x.id===p.opportunityId;});
      var newAct={
        id:uid(),kind:'project',projectId:p.opportunityId,programId:'',
        task:'Task_'+((opp&&opp.name)||'').replace(/[^A-Za-z0-9]+/g,'').slice(0,40)+'_RedTeam',
        subtask:'Red-Team Review · '+p.title,
        outline:'AI-generated section-by-section rubric is on the proposal\'s Red Team tab. Each reviewer scores Compliance/Win Themes/Clarity/Risk 1-5 per section.',
        objective:'Submit scored rubric before submission.',phase:'Month 1',status:'todo',
        start:'',dueDate:dueDate.trim(),isMilestone:true,parentId:null,
        pm:(opp&&opp.pm)||'',ownerText:who,owners:planResolveOwners(who),
        updates:[],attachments:[],order:(D.activities||[]).length
      };
      D.activities=D.activities||[];D.activities.push(newAct);

      p.events=p.events||[];p.events.push({ts:Date.now(),actorId:ME?ME.id:'',actorName:ME?ME.name:'—',type:'redteam.assigned',payload:{taskId:newAct.id,reviewers:who}});

function openWinLossModal(propId,status){
  var p=(D.proposals||[]).find(function(x){return x.id===propId;});if(!p)return;
  var linkedReqs=(D.recruitings||[]).filter(function(r){return r.proposalId===propId;});
  var pendingContingent=linkedReqs.filter(function(r){return r.proposalContingent;});
  var sectionsCt=(p.sections||[]).filter(function(s){return (s.html||'').trim()&&(s.source==='ai'||s.source==='hybrid');}).length;
  var won=status==='won';
  var heading=won?'🎉 Proposal Won — Wrap-Up Workflow':'❌ Proposal Lost — Wrap-Up Workflow';
  var intro=won
    ?'Congrats! Let\'s flip the proposal-contingent requisitions to active hires, capture the win details, and (optionally) promote winning sections back to the template library.'
    :'Let\'s capture the loss reasons for future learning, decide what to do with linked requisitions, and (optionally) update the Company Profile case-study library.';
  var reqRows=pendingContingent.length?pendingContingent.map(function(r){
    return '<div class="wl-action"><div><b>'+esc(r.jdTitle||'(unnamed req)')+'</b><div style="font-size:10px;color:var(--text-muted)">status: '+esc(r.status||'open')+'</div></div>'

        :'<div style="display:flex;gap:4px"><button class="btn btn-sec btn-sm" onclick="wlReqAction(\''+propId+'\',\''+r.id+'\',\'keep\')">Keep open</button><button class="btn btn-danger-sm btn-sm" onclick="wlReqAction(\''+propId+'\',\''+r.id+'\',\'cancel\')">Cancel</button></div>')
      +'</div>';
  }).join(''):'<div style="font-size:11px;color:var(--text-muted);padding:10px;text-align:center">No proposal-contingent requisitions linked to this proposal.</div>';
  var sectionsPromo=won&&sectionsCt
    ?'<div class="wl-action"><div><b>Promote winning sections to Template library</b><div style="font-size:10px;color:var(--text-muted)">'+sectionsCt+' AI-drafted section'+(sectionsCt===1?'':'s')+' could become reusable boilerplate.</div></div><button class="btn btn-sec btn-sm" onclick="wlPromoteSections(\''+propId+'\')">Pick &amp; Promote</button></div>'
    :'';
  var caseStudyPromo=won
    ?'<div class="wl-action"><div><b>Add to Company Profile case studies</b><div style="font-size:10px;color:var(--text-muted)">Quick add — outcomes can be filled in later.</div></div><button class="btn btn-sec btn-sm" onclick="wlAddCaseStudy(\''+propId+'\')">Add Case Study</button></div>'
    :'';
  document.getElementById('mdlWinLoss').innerHTML=
    '<div class="mdl-over">Wrap-Up Workflow</div><div class="mdl-title">'+heading+'</div>'
    +'<div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">'+esc(intro)+'</div>'
    +'<span class="fld-section-hdr" style="margin-top:0">Debrief Notes</span>'
    +'<div class="fld"><textarea class="fld-i" id="wl_notes" rows="4" placeholder="'+(won?'Why did we win? What worked? Key personnel? Pricing strategy?':'Why did we lose? Was it scope/price/team/clearance/relationship? Anything to do differently?')+'">'+esc(((p.winLoss&&p.winLoss.notes)||''))+'</textarea></div>'
    +'<span class="fld-section-hdr">Linked Requisitions ('+pendingContingent.length+')</span>'
    +reqRows
    +(sectionsPromo||caseStudyPromo?'<span class="fld-section-hdr">Library Feedback</span>'+sectionsPromo+caseStudyPromo:'')
    +'<div class="btn-row" style="margin-top:14px">'
    +'<button class="btn btn-navy" style="flex:1" onclick="wlSave(\''+propId+'\',\''+status+'\')">Save Debrief &amp; Close</button>'
    +'<button class="btn btn-sec" style="flex:1" onclick="closeModal(\'ovWinLoss\')">Close without saving</button>'
    +'</div>';

function wlReqAction(propId,reqId,action){
  var req=(D.recruitings||[]).find(function(r){return r.id===reqId;});if(!req)return;
  if(action==='activate'){req.proposalContingent=false;req.status='open';alert('Requisition flipped to standard active hire.');}
  else if(action==='cancel'){if(!confirm('Cancel this requisition? (Status will be set to cancelled; the req row stays for the audit trail.)'))return;req.status='cancelled';}
  else if(action==='keep'){alert('Requisition kept open as-is.');}
  save();openWinLossModal(propId,(D.proposals.find(function(x){return x.id===propId;})||{}).status);
}
function wlSave(propId,status){
  var p=(D.proposals||[]).find(function(x){return x.id===propId;});if(!p)return;
  p.winLoss={status:status,decidedAt:Date.now(),decidedBy:ME?ME.id:'',notes:gv('wl_notes').trim()};
  p.events=p.events||[];p.events.push({ts:Date.now(),actorId:ME?ME.id:'',actorName:ME?ME.name:'—',type:'winloss.recorded',payload:{status:status}});
  save();closeModal('ovWinLoss');renderProposalDetail(propId);
}
function wlPromoteSections(propId){
  var p=(D.proposals||[]).find(function(x){return x.id===propId;});if(!p)return;
  var tpl=(D.proposalTemplates||[]).find(function(t){return t.id===p.templateId;});
  if(!tpl){toast('No template linked — can\'t promote.','warn');return;}
  var sections=(p.sections||[]).filter(function(s){return (s.html||'').trim()&&(s.source==='ai'||s.source==='hybrid');});
  if(!sections.length){toast('No AI-drafted sections to promote.','info');return;}
  openFormModal({over:'Win/Loss',title:'Promote Winning Sections',submitLabel:'Promote Selected',
    intro:'Selected sections become reusable winning examples on the template “'+tpl.name+'” — future drafts reference them.',
    fields:[{key:'secs',label:'Sections to promote',type:'checkboxes',required:true,options:sections.map(function(s){return {value:s.id,label:s.title};})}],
    onSubmit:function(v){

function pushNotifMulti(memberIds,kind,refType,refId,msg){

function myNotifications(){

function renderNotifBadge(){
